<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07110f"/>
      <stop offset="0.52" stop-color="#10231f"/>
      <stop offset="1" stop-color="#1b2524"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#8ddbc8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:900;font-size:42px;fill:#f3fff9;letter-spacing:0}
      .sub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:19px;fill:#a8c7bd;letter-spacing:0}
      .nodeTitle{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:800;font-size:24px;fill:#f4fff9;letter-spacing:0}
      .nodeSub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:15px;fill:#b7cfc6;letter-spacing:0}
      .num{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:900;font-size:18px;fill:#07110f;letter-spacing:0}
      .tag{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:700;font-size:16px;fill:#d6fff1;letter-spacing:0}
      .small{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:14px;fill:#89aa9f;letter-spacing:0}
      .line{fill:none;stroke:#8ddbc8;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 90H1280M0 180H1280M0 270H1280M0 360H1280M0 450H1280M0 540H1280M0 630H1280M100 0V720M200 0V720M300 0V720M400 0V720M500 0V720M600 0V720M700 0V720M800 0V720M900 0V720M1000 0V720M1100 0V720M1200 0V720" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
  <path d="M73 132 C236 75 386 168 548 112 C728 51 883 142 1206 74" fill="none" stroke="#47d7b8" stroke-opacity="0.22" stroke-width="2"/>
  <text x="64" y="76" class="title">Linux 服务器安装 Codex 路线</text>
  <text x="66" y="112" class="sub">SSH → 普通用户 → Node/Git → Codex → ~/.codex → 第一次提问 → 日志核对</text>
  <text x="1202" y="82" class="small" text-anchor="end">V013 / 服务器安装</text>

  <g transform="translate(68 164)" filter="url(#shadow)">
    <rect width="170" height="118" rx="10" fill="#132823" stroke="#31584d"/>
    <circle cx="30" cy="30" r="16" fill="#5ee3be"/>
    <text x="24" y="36" class="num">1</text>
    <text x="24" y="70" class="nodeTitle">ECS/安全组</text>
    <text x="24" y="98" class="nodeSub">快照与 SSH</text>
  </g>
  <path class="line" d="M246 224 H320"/>
  <g transform="translate(326 164)" filter="url(#shadow)">
    <rect width="148" height="118" rx="10" fill="#102a31" stroke="#2f6574"/>
    <circle cx="30" cy="30" r="16" fill="#67e8f9"/>
    <text x="24" y="36" class="num">2</text>
    <text x="24" y="70" class="nodeTitle">SSH 登录</text>
    <text x="24" y="98" class="nodeSub">IP/密钥隐藏</text>
  </g>
  <path class="line" d="M482 224 H555"/>
  <g transform="translate(562 164)" filter="url(#shadow)">
    <rect width="158" height="118" rx="10" fill="#152a1f" stroke="#3b6751"/>
    <circle cx="30" cy="30" r="16" fill="#a7f3d0"/>
    <text x="24" y="36" class="num">3</text>
    <text x="24" y="70" class="nodeTitle">普通用户</text>
    <text x="24" y="98" class="nodeSub">不要写 root</text>
  </g>
  <path class="line" d="M728 224 H806"/>
  <g transform="translate(812 164)" filter="url(#shadow)">
    <rect width="168" height="118" rx="10" fill="#282415" stroke="#6d6233"/>
    <circle cx="30" cy="30" r="16" fill="#facc15"/>
    <text x="24" y="36" class="num">4</text>
    <text x="24" y="70" class="nodeTitle">Node / Git</text>
    <text x="24" y="98" class="nodeSub">Node.js 22+</text>
  </g>
  <path class="line" d="M988 224 H1063"/>
  <g transform="translate(1068 164)" filter="url(#shadow)">
    <rect width="148" height="118" rx="10" fill="#173126" stroke="#3b7961"/>
    <circle cx="30" cy="30" r="16" fill="#34d399"/>
    <text x="24" y="36" class="num">5</text>
    <text x="24" y="70" class="nodeTitle">装 Codex</text>
    <text x="24" y="98" class="nodeSub">npm / 版本</text>
  </g>

  <path class="line" d="M1142 290 C1140 350 1062 372 1006 384"/>
  <g transform="translate(832 370)" filter="url(#shadow)">
    <rect width="174" height="124" rx="10" fill="#1c2634" stroke="#426078"/>
    <circle cx="32" cy="32" r="16" fill="#93c5fd"/>
    <text x="26" y="38" class="num">6</text>
    <text x="26" y="74" class="nodeTitle">配置 Key</text>
    <text x="26" y="103" class="nodeSub">auth / config</text>
  </g>
  <path class="line" d="M824 432 H725"/>
  <g transform="translate(542 370)" filter="url(#shadow)">
    <rect width="176" height="124" rx="10" fill="#20202d" stroke="#5a5872"/>
    <circle cx="32" cy="32" r="16" fill="#c4b5fd"/>
    <text x="26" y="38" class="num">7</text>
    <text x="26" y="74" class="nodeTitle">首次提问</text>
    <text x="26" y="103" class="nodeSub">只读低风险</text>
  </g>
  <path class="line" d="M534 432 H438"/>
  <g transform="translate(260 370)" filter="url(#shadow)">
    <rect width="178" height="124" rx="10" fill="#102f2a" stroke="#2f7868"/>
    <circle cx="32" cy="32" r="16" fill="#5eead4"/>
    <text x="26" y="38" class="num">8</text>
    <text x="26" y="74" class="nodeTitle">日志核对</text>
    <text x="26" y="103" class="nodeSub">/logs 对时间</text>
  </g>

  <g transform="translate(70 570)">
    <rect width="1140" height="80" rx="10" fill="#111b19" stroke="#2b403b"/>
    <text x="26" y="32" class="small">失败时排查顺序</text>
    <g transform="translate(26 54)">
      <rect x="0" y="-18" width="90" height="30" rx="15" fill="#18352f"/><text x="15" y="3" class="tag">终端输出</text>
      <rect x="108" y="-18" width="90" height="30" rx="15" fill="#18352f"/><text x="123" y="3" class="tag">配置文件</text>
      <rect x="216" y="-18" width="118" height="30" rx="15" fill="#18352f"/><text x="231" y="3" class="tag">Key/API 地址</text>
      <rect x="352" y="-18" width="90" height="30" rx="15" fill="#18352f"/><text x="367" y="3" class="tag">权益状态</text>
      <rect x="460" y="-18" width="76" height="30" rx="15" fill="#18352f"/><text x="475" y="3" class="tag">日志页</text>
      <rect x="554" y="-18" width="62" height="30" rx="15" fill="#18352f"/><text x="569" y="3" class="tag">网络</text>
      <rect x="634" y="-18" width="62" height="30" rx="15" fill="#18352f"/><text x="649" y="3" class="tag">权限</text>
      <rect x="714" y="-18" width="90" height="30" rx="15" fill="#18352f"/><text x="729" y="3" class="tag">项目目录</text>
    </g>
