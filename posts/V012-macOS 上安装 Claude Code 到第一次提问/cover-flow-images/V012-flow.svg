<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101419"/>
      <stop offset="0.55" stop-color="#151c24"/>
      <stop offset="1" stop-color="#20261f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 42px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #f3f7f2; }
      .subtitle { font: 500 18px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #b6c4bc; }
      .nodeTitle { font: 700 22px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #f4f7f4; }
      .nodeText { font: 500 15px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #c7d2cc; }
      .code { font: 600 14px "SFMono-Regular", Menlo, Consolas, monospace; fill: #dce7dd; }
      .tag { font: 600 14px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #d9e6dd; }
      .small { font: 500 13px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #9fb0a7; }
      .line { stroke: #7f9488; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrow { fill: #8ca196; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="42" y="38" width="1196" height="644" rx="22" fill="#0d1116" opacity="0.42"/>
  <text x="76" y="92" class="title">macOS 安装 Claude Code 到第一次提问</text>
  <text x="78" y="126" class="subtitle">官方安装 Claude Code 本体，积木代码助手负责 Claude Code Key 与 API 地址配置</text>

  <g filter="url(#shadow)">
    <rect x="76" y="176" width="168" height="168" rx="18" fill="#19232b" stroke="#33424a"/>
    <circle cx="106" cy="210" r="13" fill="#7dd3fc"/>
    <text x="128" y="218" class="nodeTitle">检查环境</text>
    <text x="100" y="258" class="nodeText">Terminal / zsh</text>
    <text x="100" y="286" class="nodeText">Node.js 18+</text>
    <text x="100" y="314" class="code">command -v claude</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="294" y="176" width="178" height="168" rx="18" fill="#1e2a24" stroke="#405148"/>
    <circle cx="324" cy="210" r="13" fill="#a7f3d0"/>
    <text x="346" y="218" class="nodeTitle">安装本体</text>
    <text x="318" y="258" class="nodeText">官方 install.sh</text>
    <text x="318" y="286" class="nodeText">Homebrew 备选</text>
    <text x="318" y="314" class="code">claude --version</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="522" y="176" width="178" height="168" rx="18" fill="#24262e" stroke="#464a5a"/>
    <circle cx="552" cy="210" r="13" fill="#c4b5fd"/>
    <text x="574" y="218" class="nodeTitle">创建 Key</text>
    <text x="546" y="258" class="nodeText">积木 /keys</text>
    <text x="546" y="286" class="nodeText">产品线：Claude Code</text>
    <text x="546" y="314" class="nodeText">Key 全程隐藏</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="750" y="176" width="188" height="168" rx="18" fill="#261f23" stroke="#534149"/>
    <circle cx="780" cy="210" r="13" fill="#f9a8d4"/>
    <text x="802" y="218" class="nodeTitle">写 zsh 配置</text>
    <text x="774" y="258" class="code">~/.zshrc</text>
    <text x="774" y="286" class="code">ANTHROPIC_BASE_URL</text>
    <text x="774" y="314" class="code">source ~/.zshrc</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="988" y="176" width="186" height="168" rx="18" fill="#27251d" stroke="#554f37"/>
    <circle cx="1018" cy="210" r="13" fill="#fde68a"/>
    <text x="1040" y="218" class="nodeTitle">首次运行</text>
    <text x="1012" y="258" class="nodeText">测试目录</text>
    <text x="1012" y="286" class="code">claude</text>
    <text x="1012" y="314" class="nodeText">先问只读问题</text>
  </g>

  <path class="line" d="M244 260 H286"/>
  <path class="line" d="M472 260 H514"/>
  <path class="line" d="M700 260 H742"/>
  <path class="line" d="M938 260 H980"/>
  <polygon class="arrow" points="286,260 276,254 276,266"/>
  <polygon class="arrow" points="514,260 504,254 504,266"/>
  <polygon class="arrow" points="742,260 732,254 732,266"/>
  <polygon class="arrow" points="980,260 970,254 970,266"/>

  <g filter="url(#shadow)">
    <rect x="388" y="410" width="504" height="94" rx="18" fill="#111821" stroke="#2f3f4a"/>
    <text x="424" y="448" class="nodeTitle">日志核对</text>
    <text x="424" y="478" class="nodeText">打开积木 /logs，核对请求时间、产品线、模型和状态；个人明细需登录后确认。</text>
  </g>
  <path class="line" d="M1080 344 C1080 390 960 412 900 442"/>
  <polygon class="arrow" points="900,442 911,440 905,431"/>

  <rect x="76" y="560" width="1128" height="58" rx="16" fill="#151b20" stroke="#2f3a40"/>
  <text x="102" y="594" class="small">排查顺序</text>
  <g>
    <rect x="190" y="574" width="86" height="28" rx="14" fill="#20313a"/><text x="210" y="594" class="tag">终端输出</text>
    <rect x="288" y="574" width="82" height="28" rx="14" fill="#20332a"/><text x="306" y="594" class="tag">zsh 配置</text>
    <rect x="382" y="574" width="126" height="28" rx="14" fill="#2c2938"/><text x="400" y="594" class="tag">Claude Code Key</text>
    <rect x="520" y="574" width="86" height="28" rx="14" fill="#352832"/><text x="538" y="594" class="tag">API 地址</text>
    <rect x="618" y="574" width="86" height="28" rx="14" fill="#383420"/><text x="636" y="594" class="tag">权益状态</text>
    <rect x="716" y="574" width="72" height="28" rx="14" fill="#293241"/><text x="738" y="594" class="tag">日志页</text>
    <rect x="800" y="574" width="86" height="28" rx="14" fill="#243135"/><text x="818" y="594" class="tag">网络代理</text>
    <rect x="898" y="574" width="86" height="28" rx="14" fill="#302c25"/><text x="916" y="594" class="tag">项目目录</text>
  </g>

  <text x="78" y="654" class="small">正式录屏以现场页面、Key 状态和终端输出为准。</text>
</svg>
