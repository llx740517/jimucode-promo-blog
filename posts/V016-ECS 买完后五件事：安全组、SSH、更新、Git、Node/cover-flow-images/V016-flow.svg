<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V016 ECS 初始化流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111e"/>
      <stop offset="0.54" stop-color="#10233a"/>
      <stop offset="1" stop-color="#07111e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3147"/>
      <stop offset="1" stop-color="#142238"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L7,4 L1,7" fill="none" stroke="#9fb8d5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 800 42px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 500 20px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #bfd0e3; letter-spacing: 0; }
      .node-title { font: 800 23px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .node-text { font: 500 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #cbd5e1; letter-spacing: 0; }
      .num { font: 800 18px Arial, sans-serif; fill: #08111f; }
      .terminal { font: 500 17px Consolas, "SFMono-Regular", Menlo, monospace; fill: #d1d5db; letter-spacing: 0; }
      .terminal-green { font: 700 17px Consolas, "SFMono-Regular", Menlo, monospace; fill: #7dd3a8; letter-spacing: 0; }
      .terminal-blue { font: 700 17px Consolas, "SFMono-Regular", Menlo, monospace; fill: #93c5fd; letter-spacing: 0; }
      .tag { font: 700 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #e5f0ff; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M70 134 C236 82 398 134 554 100 C760 54 910 116 1200 70" fill="none" stroke="#60a5fa" stroke-opacity="0.20" stroke-width="2"/>
  <path d="M88 592 C250 532 430 594 610 548 C790 500 1000 520 1198 472" fill="none" stroke="#34d399" stroke-opacity="0.18" stroke-width="2"/>

  <text x="72" y="76" class="title">ECS 买完后：先初始化，再装工具</text>
  <text x="74" y="112" class="subtitle">安全组 → SSH → 用户权限 → 系统更新 → Git / Node → 快照与验证</text>

  <g transform="translate(862 46)" filter="url(#shadow)">
    <rect x="0" y="0" width="346" height="122" rx="8" fill="#07101d" stroke="#334155"/>
    <rect x="0" y="0" width="346" height="36" rx="8" fill="#132033"/>
    <circle cx="22" cy="18" r="5" fill="#ef4444"/>
    <circle cx="40" cy="18" r="5" fill="#f59e0b"/>
    <circle cx="58" cy="18" r="5" fill="#22c55e"/>
    <text x="24" y="64" class="terminal">$ ssh user@203.0.113.xx</text>
    <text x="24" y="94" class="terminal-green">git / node ready</text>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(58 190)">
      <rect width="164" height="132" rx="8" fill="url(#card)" stroke="#50627c"/>
      <circle cx="28" cy="28" r="16" fill="#93c5fd"/>
      <text x="23" y="34" class="num">1</text>
      <text x="20" y="69" class="node-title">ECS / 安全组</text>
      <text x="20" y="99" class="node-text">运行 / 公网 IP</text>
      <text x="20" y="123" class="node-text">22 端口来源</text>
    </g>
    <g transform="translate(254 190)">
      <rect width="164" height="132" rx="8" fill="url(#card)" stroke="#50627c"/>
      <circle cx="28" cy="28" r="16" fill="#86efac"/>
      <text x="23" y="34" class="num">2</text>
      <text x="20" y="69" class="node-title">SSH 连接</text>
      <text x="20" y="99" class="node-text">用户名 / 密钥</text>
      <text x="20" y="123" class="node-text">chmod 600</text>
    </g>
    <g transform="translate(450 190)">
      <rect width="164" height="132" rx="8" fill="url(#card)" stroke="#50627c"/>
      <circle cx="28" cy="28" r="16" fill="#fcd34d"/>
      <text x="23" y="34" class="num">3</text>
      <text x="20" y="69" class="node-title">用户权限</text>
      <text x="20" y="99" class="node-text">whoami</text>
      <text x="20" y="123" class="node-text">root / 普通用户</text>
    </g>
    <g transform="translate(646 190)">
      <rect width="164" height="132" rx="8" fill="url(#card)" stroke="#50627c"/>
      <circle cx="28" cy="28" r="16" fill="#c4b5fd"/>
      <text x="23" y="34" class="num">4</text>
      <text x="20" y="69" class="node-title">系统更新</text>
      <text x="20" y="99" class="node-text">apt / dnf / yum</text>
      <text x="20" y="123" class="node-text">按镜像选择</text>
    </g>
    <g transform="translate(842 190)">
      <rect width="164" height="132" rx="8" fill="url(#card)" stroke="#50627c"/>
      <circle cx="28" cy="28" r="16" fill="#fca5a5"/>
      <text x="23" y="34" class="num">5</text>
      <text x="20" y="69" class="node-title">Git / Node</text>
      <text x="20" y="99" class="node-text">安装后验证</text>
      <text x="20" y="123" class="node-text">npm -v</text>
    </g>
    <g transform="translate(1038 190)">
      <rect width="164" height="132" rx="8" fill="url(#card)" stroke="#50627c"/>
      <circle cx="28" cy="28" r="16" fill="#7dd3fc"/>
      <text x="23" y="34" class="num">6</text>
      <text x="20" y="69" class="node-title">快照 / 验证</text>
      <text x="20" y="99" class="node-text">重要操作前备份</text>
      <text x="20" y="123" class="node-text">费用风险</text>
    </g>
  </g>

  <g stroke="#9fb8d5" stroke-width="1.6" stroke-linecap="round" marker-end="url(#arrow)">
    <line x1="230" y1="256" x2="242" y2="256"/>
    <line x1="426" y1="256" x2="438" y2="256"/>
    <line x1="622" y1="256" x2="634" y2="256"/>
    <line x1="818" y1="256" x2="830" y2="256"/>
    <line x1="1014" y1="256" x2="1026" y2="256"/>
  </g>

  <g transform="translate(112 382)" filter="url(#shadow)">
    <rect x="0" y="0" width="1056" height="124" rx="8" fill="#07101d" stroke="#334155"/>
    <text x="28" y="41" class="terminal">$ cat /etc/os-release</text>
    <text x="350" y="41" class="terminal">$ sudo apt update</text>
    <text x="650" y="41" class="terminal">$ git --version &amp;&amp; node -v</text>
    <text x="28" y="82" class="terminal-green">先判断镜像，再选更新命令</text>
    <text x="420" y="82" class="terminal-blue">基础工具验证后，再部署 AI 编程工具</text>
  </g>

  <g transform="translate(72 560)">
    <rect x="0" y="0" width="1136" height="78" rx="8" fill="#132033" stroke="#334155"/>
    <text x="24" y="31" class="subtitle">底部检查标签</text>
    <g transform="translate(24 49)">
      <rect x="0" y="-18" width="96" height="30" rx="15" fill="#1f4461"/>
      <text x="13" y="3" class="tag">ECS 控制台</text>
      <rect x="110" y="-18" width="72" height="30" rx="15" fill="#263f59"/>
      <text x="126" y="3" class="tag">安全组</text>
      <rect x="196" y="-18" width="78" height="30" rx="15" fill="#263f59"/>
      <text x="211" y="3" class="tag">公网 IP</text>
      <rect x="288" y="-18" width="54" height="30" rx="15" fill="#1f4b3f"/>
      <text x="304" y="3" class="tag">SSH</text>
      <rect x="356" y="-18" width="88" height="30" rx="15" fill="#1f4b3f"/>
      <text x="372" y="3" class="tag">密钥权限</text>
      <rect x="458" y="-18" width="54" height="30" rx="15" fill="#493d22"/>
      <text x="473" y="3" class="tag">root</text>
      <rect x="526" y="-18" width="88" height="30" rx="15" fill="#493d22"/>
      <text x="543" y="3" class="tag">普通用户</text>
      <rect x="628" y="-18" width="88" height="30" rx="15" fill="#332f54"/>
      <text x="645" y="3" class="tag">系统更新</text>
      <rect x="730" y="-18" width="54" height="30" rx="15" fill="#4c3034"/>
      <text x="746" y="3" class="tag">Git</text>
      <rect x="798" y="-18" width="62" height="30" rx="15" fill="#4c3034"/>
      <text x="814" y="3" class="tag">Node</text>
      <rect x="874" y="-18" width="62" height="30" rx="15" fill="#1f4461"/>
      <text x="890" y="3" class="tag">快照</text>
      <rect x="950" y="-18" width="88" height="30" rx="15" fill="#4c3034"/>
      <text x="967" y="3" class="tag">释放实例</text>
    </g>
  </g>
</svg>
