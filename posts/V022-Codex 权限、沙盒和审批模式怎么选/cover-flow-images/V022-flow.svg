<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Codex 权限选择和审批检查路径">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#172033"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:900;fill:#f8fafc;letter-spacing:0}
      .sub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:700;fill:#cbd5e1;letter-spacing:0}
      .label{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:850;fill:#f8fafc;letter-spacing:0}
      .small{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:700;fill:#cbd5e1;letter-spacing:0}
      .mono{font-family:Menlo,Consolas,"SFMono-Regular",monospace;font-weight:800;fill:#93c5fd}
      .node{fill:url(#card);stroke:#334155;stroke-width:1.4;filter:url(#shadow)}
      .line{stroke:#9ca3af;stroke-width:2;fill:none;marker-end:url(#arrow);stroke-linecap:round}
      .pill{fill:#0f172a;stroke:#475569;stroke-width:1}
      .risk{fill:#3b1018;stroke:#ef4444;stroke-width:1.2}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.22">
    <path d="M0 110H1280M0 220H1280M0 330H1280M0 440H1280M0 550H1280" stroke="#94a3b8" stroke-width="1"/>
    <path d="M120 0V720M260 0V720M400 0V720M540 0V720M680 0V720M820 0V720M960 0V720M1100 0V720" stroke="#94a3b8" stroke-width="1"/>
  </g>
  <text class="title" x="64" y="76" font-size="40">Codex 权限选择和审批检查路径</text>
  <text class="sub" x="64" y="112" font-size="20">先选最窄权限，再核对状态和 diff</text>
  <g transform="translate(62 168)">
    <rect class="node" x="0" y="0" width="170" height="122" rx="8"/>
    <text class="label" x="22" y="38" font-size="24">判断任务</text>
    <text class="small" x="22" y="70" font-size="18">只读 / 改项目</text>
    <text class="small" x="22" y="98" font-size="18">自动化 / 满权限</text>
  </g>
  <path class="line" d="M242 229H306"/>
  <g transform="translate(316 168)">
    <rect class="node" x="0" y="0" width="206" height="122" rx="8"/>
    <text class="label" x="22" y="36" font-size="24">选沙盒</text>
    <text class="mono" x="22" y="69" font-size="18">read-only</text>
    <text class="mono" x="22" y="96" font-size="18">workspace-write</text>
  </g>
  <path class="line" d="M532 229H596"/>
  <g transform="translate(606 168)">
    <rect class="node" x="0" y="0" width="198" height="122" rx="8"/>
    <text class="label" x="22" y="36" font-size="24">选审批</text>
    <text class="mono" x="22" y="69" font-size="18">on-request</text>
    <text class="mono" x="22" y="96" font-size="18">untrusted / never</text>
  </g>
  <path class="line" d="M814 229H878"/>
  <g transform="translate(888 168)">
    <rect class="node" x="0" y="0" width="328" height="122" rx="8"/>
    <text class="label" x="22" y="36" font-size="24">核对状态</text>
    <text class="mono" x="22" y="70" font-size="18">/permissions  /status</text>
    <text class="mono" x="22" y="98" font-size="18">/debug-config</text>
  </g>
  <path class="line" d="M1052 302V360"/>
  <g transform="translate(822 374)">
    <rect class="risk" x="0" y="0" width="394" height="128" rx="8"/>
    <text class="label" x="24" y="38" font-size="24">审批前检查</text>
    <text class="small" x="24" y="72" font-size="18">命令 · 路径 · 网络 · .env · Key</text>
    <text class="small" x="24" y="102" font-size="18">项目外目录和危险参数先停一下</text>
  </g>
  <path class="line" d="M812 438H746"/>
  <g transform="translate(474 374)">
    <rect class="node" x="0" y="0" width="262" height="128" rx="8"/>
    <text class="label" x="24" y="38" font-size="24">运行后验收</text>
    <text class="mono" x="24" y="74" font-size="18">git status --short</text>
    <text class="mono" x="24" y="104" font-size="18">git diff</text>
  </g>
  <path class="line" d="M464 438H398"/>
  <g transform="translate(64 374)">
    <rect class="node" x="0" y="0" width="324" height="128" rx="8"/>
    <text class="label" x="24" y="38" font-size="24">必要时查日志</text>
    <text class="small" x="24" y="74" font-size="18">请求异常再看日志页</text>
    <text class="small" x="24" y="104" font-size="18">日志 ID / 用量必须隐藏</text>
  </g>
  <g transform="translate(64 590)">
    <rect class="pill" x="0" y="0" width="1152" height="54" rx="8"/>
    <text class="small" x="24" y="35" font-size="18">排查顺序：终端输出 · 配置文件 · Key/API 地址 · 权益状态 · 日志页 · 网络 · 权限 · 项目目录</text>
  </g>
  <g transform="translate(996 64)">
    <rect fill="#111827" stroke="#475569" x="0" y="0" width="220" height="54" rx="8"/>
    <text class="mono" x="18" y="34" font-size="18">V022 · MR-12</text>
  </g>
</svg>

