<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V001 购买 Key 到日志核对流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.46" stop-color="#0c2534"/>
      <stop offset="1" stop-color="#14251d"/>
    </linearGradient>
    <linearGradient id="heroLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#142235" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#0a1727" stop-opacity="0.99"/>
    </linearGradient>
    <linearGradient id="logPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2b3e"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#36536a" stroke-width="1" opacity="0.22"/>
    </pattern>
    <filter id="cardShadow" x="-18%" y="-26%" width="136%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; letter-spacing: 0; }
      .title { font-size: 46px; font-weight: 930; fill: #f8fafc; }
      .sub { font-size: 22px; font-weight: 760; fill: #b9ccdc; }
      .card { fill: url(#panel); stroke: #2e5870; stroke-width: 1.7; filter: url(#cardShadow); }
      .cardBlue { stroke: #38bdf8; }
      .cardGreen { stroke: #34d399; }
      .cardAmber { stroke: #fbbf24; }
      .cardPurple { stroke: #a78bfa; }
      .cardRed { stroke: #fb7185; }
      .numText { font-size: 20px; font-weight: 950; fill: #061321; }
      .nodeTitle { font-size: 27px; font-weight: 930; fill: #f8fafc; }
      .nodeDesc { font-size: 19px; font-weight: 780; fill: #d1dfeb; }
      .nodePath { font-size: 18px; font-weight: 850; fill: #7dd3fc; }
      .flowLine { stroke: #7dd3fc; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); opacity: 0.96; }
      .glowLine { stroke: url(#heroLine); stroke-width: 7; fill: none; stroke-linecap: round; opacity: 0.26; filter: url(#softGlow); }
      .infoBox { fill: rgba(8, 18, 32, 0.78); stroke: #2f5970; stroke-width: 1.4; }
      .infoTitle { font-size: 22px; font-weight: 920; fill: #f8fafc; }
      .infoText { font-size: 18px; font-weight: 770; fill: #c9d8e4; }
      .codeText { font-size: 17px; font-weight: 800; fill: #93c5fd; }
      .logHead { font-size: 22px; font-weight: 930; fill: #e2e8f0; }
      .logText { font-size: 18px; font-weight: 820; fill: #c8d5e0; }
      .success { fill: #4ade80; }
      .warn { fill: #f59e0b; }
      .danger { fill: #fb7185; }
      .chip { fill: rgba(226, 244, 255, 0.11); stroke: #3a6379; stroke-width: 1.3; }
      .chipText { font-size: 19px; font-weight: 900; fill: #e4f1f8; }
      .sectionNote { font-size: 25px; font-weight: 920; fill: #d7e7f4; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <circle cx="142" cy="96" r="170" fill="#1d4ed8" opacity="0.12"/>
  <circle cx="1120" cy="616" r="210" fill="#16a34a" opacity="0.12"/>
  <path d="M 70 350 C 248 292 399 301 542 334 C 722 376 820 315 966 275 C 1059 250 1140 256 1210 279" stroke="url(#heroLine)" stroke-width="2" fill="none" opacity="0.34"/>

  <rect x="54" y="42" width="1172" height="98" rx="24" fill="rgba(7, 17, 31, 0.74)" stroke="#2c5368" stroke-width="1.2"/>
  <text class="font title" x="82" y="91">购买 Key 到日志核对完整路线</text>
  <text class="font sub" x="84" y="123">网站购买 · Key 配置 · 终端验证 · 日志闭环</text>

  <path class="glowLine" d="M 236 273 L 306 273 L 376 273 L 446 273 L 516 273 L 586 273 L 656 273 L 726 273 L 796 273 L 866 273 L 936 273 L 1006 273"/>
  <path class="flowLine" d="M 250 273 L 318 273"/>
  <path class="flowLine" d="M 480 273 L 548 273"/>
  <path class="flowLine" d="M 710 273 L 778 273"/>
  <path class="flowLine" d="M 940 273 L 1008 273"/>

  <g transform="translate(70 185)">
    <rect class="card cardBlue" x="0" y="0" width="190" height="176" rx="20"/>
    <circle cx="34" cy="36" r="22" fill="#38bdf8"/><text class="font numText" x="27" y="43">1</text>
    <text class="font nodeTitle" x="66" y="46">购买/兑换</text>
    <text class="font nodeDesc" x="24" y="94">选对产品线</text>
    <text class="font nodeDesc" x="24" y="126">确认到账</text>
    <text class="font nodePath" x="24" y="157">/pricing</text>
  </g>

  <g transform="translate(300 185)">
    <rect class="card cardGreen" x="0" y="0" width="190" height="176" rx="20"/>
    <circle cx="34" cy="36" r="22" fill="#34d399"/><text class="font numText" x="27" y="43">2</text>
    <text class="font nodeTitle" x="66" y="46">创建 Key</text>
    <text class="font nodeDesc" x="24" y="94">选择工具</text>
    <text class="font nodeDesc" x="24" y="126">Key 不通用</text>
    <text class="font nodePath" x="24" y="157">/keys</text>
  </g>

  <g transform="translate(530 185)">
    <rect class="card cardAmber" x="0" y="0" width="190" height="176" rx="20"/>
    <circle cx="34" cy="36" r="22" fill="#fbbf24"/><text class="font numText" x="27" y="43">3</text>
    <text class="font nodeTitle" x="66" y="46">写配置</text>
    <text class="font nodeDesc" x="24" y="94">API 地址</text>
    <text class="font nodeDesc" x="24" y="126">Key / Token</text>
    <text class="font nodePath" x="24" y="157">/docs/cli</text>
  </g>

  <g transform="translate(760 185)">
    <rect class="card cardPurple" x="0" y="0" width="190" height="176" rx="20"/>
    <circle cx="34" cy="36" r="22" fill="#a78bfa"/><text class="font numText" x="27" y="43">4</text>
    <text class="font nodeTitle" x="66" y="46">最小运行</text>
    <text class="font nodeDesc" x="24" y="94">先问简单问题</text>
    <text class="font nodeDesc" x="24" y="126">确认能返回</text>
    <text class="font nodePath" x="24" y="157">codex / claude</text>
  </g>

  <g transform="translate(990 185)">
    <rect class="card cardRed" x="0" y="0" width="216" height="176" rx="20"/>
    <circle cx="34" cy="36" r="22" fill="#fb7185"/><text class="font numText" x="27" y="43">5</text>
    <text class="font nodeTitle" x="66" y="46">日志核对</text>
    <text class="font nodeDesc" x="24" y="94">时间 / 状态</text>
    <text class="font nodeDesc" x="24" y="126">模型 / 消耗</text>
    <text class="font nodePath" x="24" y="157">/logs</text>
  </g>

  <g transform="translate(70 402)">
    <rect class="infoBox" x="0" y="0" width="686" height="116" rx="18"/>
    <text class="font infoTitle" x="24" y="36">配置重点</text>
    <text class="font infoText" x="24" y="72">Codex：本机配置 + API 地址</text>
    <text class="mono codeText" x="290" y="72">~/.codex/config.toml · /p/v1</text>
    <text class="font infoText" x="24" y="102">Claude Code：环境变量 + Key</text>
    <text class="mono codeText" x="290" y="102">ANTHROPIC_BASE_URL=/p</text>
  </g>

  <g transform="translate(790 402)">
    <rect class="infoBox" x="0" y="0" width="416" height="116" rx="18"/>
    <rect x="18" y="18" width="380" height="80" rx="13" fill="url(#logPanel)" stroke="#2e4f63"/>
    <circle cx="42" cy="42" r="7" class="success"/>
    <circle cx="70" cy="42" r="7" class="warn"/>
    <circle cx="98" cy="42" r="7" class="danger"/>
    <text class="font logHead" x="126" y="50">/logs 请求记录</text>
    <text class="mono logText" x="42" y="82">time · model · status · cost</text>
  </g>

  <text class="font sectionNote" x="82" y="575">失败时按这个顺序查：</text>
  <g transform="translate(70 602)">
    <rect class="chip" x="0" y="0" width="112" height="46" rx="23"/><text class="font chipText" x="20" y="30">终端输出</text>
    <rect class="chip" x="126" y="0" width="112" height="46" rx="23"/><text class="font chipText" x="146" y="30">配置文件</text>
    <rect class="chip" x="252" y="0" width="142" height="46" rx="23"/><text class="font chipText" x="272" y="30">Key/API 地址</text>
    <rect class="chip" x="408" y="0" width="112" height="46" rx="23"/><text class="font chipText" x="428" y="30">权益状态</text>
    <rect class="chip" x="534" y="0" width="96" height="46" rx="23"/><text class="font chipText" x="558" y="30">日志页</text>
    <rect class="chip" x="644" y="0" width="84" height="46" rx="23"/><text class="font chipText" x="668" y="30">网络</text>
    <rect class="chip" x="742" y="0" width="84" height="46" rx="23"/><text class="font chipText" x="766" y="30">权限</text>
    <rect class="chip" x="840" y="0" width="112" height="46" rx="23"/><text class="font chipText" x="860" y="30">项目目录</text>
  </g>
</svg>
