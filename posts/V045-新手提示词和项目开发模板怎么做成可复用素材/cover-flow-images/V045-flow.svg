<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">V045 提示词模板复用闭环</title>
  <desc id="desc">需求场景、选择模板、填写变量、AI 生成草稿、人工核对、保存复用。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6F8FB"/>
      <stop offset="52%" stop-color="#EEF4F2"/>
      <stop offset="100%" stop-color="#F7F3EA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#122033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 5 L 0 10 z" fill="#6B7582"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-weight: 800; font-size: 44px; fill: #14213D; }
      .sub { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 20px; fill: #5C6773; }
      .node-title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-weight: 750; font-size: 22px; fill: #172033; }
      .node-text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 15px; fill: #596574; }
      .tag { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 17px; fill: #334155; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; fill: #3A5669; }
      .line { stroke: #6B7582; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="58" y="54" width="1164" height="612" rx="28" fill="#FFFFFF" opacity="0.86" filter="url(#shadow)"/>
  <text x="90" y="116" class="title">提示词模板复用闭环</text>
  <text x="92" y="152" class="sub">把一次性提问变成项目里可复用的 Markdown 素材</text>
  <g transform="translate(88 222)">
    <rect x="0" y="0" width="154" height="104" rx="16" fill="#EAF2FF" stroke="#BFD6FF"/>
    <text x="24" y="38" class="node-title">需求场景</text>
    <text x="24" y="69" class="node-text">Bug / 新功能</text>
    <text x="24" y="91" class="node-text">审查 / 发布</text>
  </g>
  <path class="line" d="M 248 274 L 308 274"/>
  <g transform="translate(314 222)">
    <rect x="0" y="0" width="154" height="104" rx="16" fill="#ECF7F0" stroke="#BFE4CD"/>
    <text x="24" y="38" class="node-title">选择模板</text>
    <text x="24" y="70" class="mono">prompts/*.md</text>
  </g>
  <path class="line" d="M 474 274 L 534 274"/>
  <g transform="translate(540 222)">
    <rect x="0" y="0" width="154" height="104" rx="16" fill="#FFF4DD" stroke="#F1D59B"/>
    <text x="24" y="38" class="node-title">填写变量</text>
    <text x="24" y="69" class="node-text">diff / 日志</text>
    <text x="24" y="91" class="node-text">目标 / 验证</text>
  </g>
  <path class="line" d="M 700 274 L 760 274"/>
  <g transform="translate(766 222)">
    <rect x="0" y="0" width="154" height="104" rx="16" fill="#F1EEFF" stroke="#D4C8FF"/>
    <text x="24" y="38" class="node-title">AI 草稿</text>
    <text x="24" y="69" class="node-text">Codex</text>
    <text x="24" y="91" class="node-text">Claude Code</text>
  </g>
  <path class="line" d="M 926 274 L 986 274"/>
  <g transform="translate(992 222)">
    <rect x="0" y="0" width="154" height="104" rx="16" fill="#FFEDEC" stroke="#F3C5C2"/>
    <text x="24" y="38" class="node-title">人工核对</text>
    <text x="24" y="69" class="node-text">看 diff / 测试</text>
    <text x="24" y="91" class="node-text">风险 / 回滚</text>
  </g>
  <path d="M 1069 331 C 1069 418 213 418 167 334" stroke="#6B7582" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-linecap="round" stroke-dasharray="7 9"/>
  <g transform="translate(504 396)">
    <rect x="0" y="0" width="272" height="78" rx="18" fill="#F8FAFC" stroke="#D9E1EA"/>
    <text x="36" y="33" class="node-title">保存复用</text>
    <text x="36" y="58" class="node-text">改进模板，写清使用场景</text>
  </g>
  <g transform="translate(112 560)">
    <rect x="0" y="0" width="1056" height="54" rx="18" fill="#F8FAFC" stroke="#E3E8EF"/>
    <text x="36" y="35" class="tag">复现</text>
    <text x="142" y="35" class="tag">期望</text>
    <text x="248" y="35" class="tag">约束</text>
    <text x="354" y="35" class="tag">验收</text>
    <text x="460" y="35" class="tag">风险</text>
    <text x="566" y="35" class="tag">回滚</text>
    <text x="672" y="35" class="tag">测试</text>
    <text x="778" y="35" class="tag">发布说明</text>
    <text x="910" y="35" class="tag">代码审查</text>
  </g>
</svg>

