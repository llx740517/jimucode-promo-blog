<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V030 项目规则模板录屏闭环流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="0.5" stop-color="#182235"/>
      <stop offset="1" stop-color="#1e2a22"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15314a"/>
      <stop offset="1" stop-color="#102238"/>
    </linearGradient>
    <linearGradient id="verify" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123c33"/>
      <stop offset="1" stop-color="#0f2a24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9.5" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#aab4c3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 800 38px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #cbd5e1; }
      .nodeTitle { font: 800 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #f8fafc; }
      .nodeText { font: 600 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #d2dce9; }
      .code { font: 700 17px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #d1fae5; }
      .chip { font: 700 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #e5e7eb; }
      .tiny { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #a7b4c5; }
      .arrow { stroke: #aab4c3; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M88 118 C240 46 370 96 516 126 C694 162 827 61 985 92 C1069 108 1136 156 1190 212" fill="none" stroke="#22d3ee" stroke-opacity="0.13" stroke-width="2"/>
  <path d="M84 586 C260 526 412 572 554 616 C732 670 884 602 1016 568 C1094 548 1154 558 1206 588" fill="none" stroke="#34d399" stroke-opacity="0.12" stroke-width="2"/>

  <text x="72" y="72" class="title">项目规则模板录屏闭环</text>
  <text x="74" y="106" class="subtitle">项目类型 → 规则模板 → 双工具入口 → 小任务 → diff / 测试 → 图文复用</text>

  <g filter="url(#shadow)">
    <rect x="72" y="164" width="214" height="230" rx="16" fill="#1d2838" stroke="#60a5fa" stroke-opacity="0.52"/>
    <text x="98" y="208" class="nodeTitle">1 选项目类型</text>
    <rect x="98" y="236" width="66" height="32" rx="16" fill="#1e40af"/><text x="131" y="257" text-anchor="middle" class="chip">前端</text>
    <rect x="176" y="236" width="66" height="32" rx="16" fill="#7c2d12"/><text x="209" y="257" text-anchor="middle" class="chip">后端</text>
    <rect x="98" y="282" width="78" height="32" rx="16" fill="#166534"/><text x="137" y="303" text-anchor="middle" class="chip">Python</text>
    <rect x="188" y="282" width="66" height="32" rx="16" fill="#6d28d9"/><text x="221" y="303" text-anchor="middle" class="chip">全栈</text>
    <text x="98" y="350" class="nodeText">每类只录一个小任务</text>
  </g>

  <line x1="286" y1="278" x2="356" y2="278" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="360" y="146" width="268" height="266" rx="16" fill="url(#rule)" stroke="#22d3ee" stroke-opacity="0.5"/>
    <text x="386" y="190" class="nodeTitle">2 写规则模板</text>
    <text x="386" y="230" class="code">AGENTS.md</text>
    <text x="386" y="262" class="code">CLAUDE.md</text>
    <text x="386" y="294" class="code">.claude/rules/*.md</text>
    <line x1="386" y1="320" x2="594" y2="320" stroke="#64748b" stroke-width="1"/>
    <text x="386" y="350" class="nodeText">具体、短、可验证</text>
    <text x="386" y="378" class="nodeText">不写 Key / Token / 私有接口</text>
  </g>

  <line x1="628" y1="278" x2="696" y2="278" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="700" y="164" width="226" height="230" rx="16" fill="#202a3b" stroke="#f59e0b" stroke-opacity="0.52"/>
    <text x="726" y="208" class="nodeTitle">3 分工具加载</text>
    <rect x="726" y="238" width="154" height="42" rx="12" fill="#111827" stroke="#334155"/>
    <text x="744" y="265" class="code">Codex</text>
    <text x="726" y="308" class="nodeText">看 AGENTS.md</text>
    <rect x="726" y="328" width="170" height="42" rx="12" fill="#111827" stroke="#334155"/>
    <text x="744" y="355" class="code">Claude Code</text>
    <text x="726" y="382" class="nodeText">看 CLAUDE.md / rules</text>
  </g>

  <line x1="926" y1="278" x2="1000" y2="278" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="1004" y="146" width="204" height="266" rx="16" fill="url(#verify)" stroke="#34d399" stroke-opacity="0.54"/>
    <text x="1030" y="190" class="nodeTitle">4 验证闭环</text>
    <text x="1030" y="232" class="nodeText">复述规则</text>
    <text x="1030" y="264" class="nodeText">提小任务</text>
    <text x="1030" y="296" class="nodeText">查看 diff</text>
    <text x="1030" y="328" class="nodeText">运行测试</text>
    <text x="1030" y="368" class="code">git diff</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="468" width="1136" height="94" rx="18" fill="#111827" stroke="#334155"/>
    <text x="98" y="508" class="nodeTitle">录屏原则</text>
    <text x="98" y="542" class="nodeText">先确认工具读到了规则，再让 AI 修改；模板只放项目规范，不放敏感数据。</text>
    <text x="748" y="542" class="code">/memory  ·  @AGENTS.md  ·  paths:</text>
  </g>

  <g>
    <rect x="72" y="600" width="1136" height="56" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="96" y="634" class="tiny">检查标签：</text>
    <g transform="translate(176 614)"><rect width="64" height="28" rx="14" fill="#273449"/><text x="32" y="19" text-anchor="middle" class="chip">文件名</text></g>
    <g transform="translate(252 614)"><rect width="78" height="28" rx="14" fill="#273449"/><text x="39" y="19" text-anchor="middle" class="chip">目录位置</text></g>
    <g transform="translate(342 614)"><rect width="78" height="28" rx="14" fill="#273449"/><text x="39" y="19" text-anchor="middle" class="chip">加载确认</text></g>
    <g transform="translate(432 614)"><rect width="78" height="28" rx="14" fill="#273449"/><text x="39" y="19" text-anchor="middle" class="chip">规则冲突</text></g>
    <g transform="translate(522 614)"><rect width="78" height="28" rx="14" fill="#273449"/><text x="39" y="19" text-anchor="middle" class="chip">测试命令</text></g>
    <g transform="translate(612 614)"><rect width="78" height="28" rx="14" fill="#273449"/><text x="39" y="19" text-anchor="middle" class="chip">Key 脱敏</text></g>
    <g transform="translate(702 614)"><rect width="78" height="28" rx="14" fill="#273449"/><text x="39" y="19" text-anchor="middle" class="chip">真实路径</text></g>
    <g transform="translate(792 614)"><rect width="78" height="28" rx="14" fill="#273449"/><text x="39" y="19" text-anchor="middle" class="chip">后续复用</text></g>
  </g>

  <text x="72" y="684" class="tiny">V030 / MR-11+MR-18+MR-19</text>
</svg>

