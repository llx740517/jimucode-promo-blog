<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V048 前端录屏项目设计路线">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="52%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#10231f"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20324d"/>
      <stop offset="100%" stop-color="#172133"/>
    </linearGradient>
    <linearGradient id="greenCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123a36"/>
      <stop offset="100%" stop-color="#102129"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2,2 L9,6 L2,10" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 40px; font-weight: 900; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: 700; fill: #cbd5e1; letter-spacing: 0; }
      .node-title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 23px; font-weight: 900; fill: #f8fafc; letter-spacing: 0; }
      .body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; font-weight: 700; fill: #dbeafe; letter-spacing: 0; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; font-weight: 700; fill: #aab7c8; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; font-weight: 800; fill: #d1fae5; letter-spacing: 0; }
      .tag { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; font-weight: 800; fill: #e5e7eb; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.18">
    <path d="M72 142 C245 56, 407 85, 568 148 S862 192, 1018 94 S1134 74, 1208 140" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <path d="M80 586 C221 520, 356 548, 482 620" fill="none" stroke="#34d399" stroke-width="2"/>
    <path d="M804 628 C925 536, 1082 526, 1196 612" fill="none" stroke="#34d399" stroke-width="2"/>
  </g>

  <text x="72" y="68" class="title">前端录屏项目设计路线</text>
  <text x="72" y="104" class="subtitle">设计五件套 → 写任务卡 → 规则文件 → AI 读项目 → 小步修改 → diff + 测试</text>

  <g filter="url(#shadow)">
    <rect x="72" y="160" width="190" height="164" rx="16" fill="url(#blueCard)" stroke="#60a5fa" stroke-opacity="0.65"/>
    <text x="96" y="203" class="node-title">1 设计五件套</text>
    <text x="96" y="238" class="body">按钮 / 表单</text>
    <text x="96" y="268" class="body">路由 / 状态</text>
    <text x="96" y="298" class="body">权限边界</text>
  </g>

  <path d="M262 242 L320 242" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="322" y="132" width="220" height="220" rx="18" fill="#211d2d" stroke="#fb923c" stroke-opacity="0.7"/>
    <text x="350" y="178" class="node-title">2 写任务卡</text>
    <text x="350" y="214" class="body">目标：一个小问题</text>
    <text x="350" y="246" class="body">范围：允许文件</text>
    <text x="350" y="278" class="body">不能改：接口/鉴权</text>
    <text x="350" y="310" class="body">验收：diff + 测试</text>
  </g>

  <path d="M542 242 L610 242" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="612" y="160" width="214" height="164" rx="16" fill="#1d2440" stroke="#a78bfa" stroke-opacity="0.7"/>
    <text x="638" y="203" class="node-title">3 规则文件</text>
    <text x="638" y="240" class="body">Codex：AGENTS.md</text>
    <text x="638" y="270" class="body">Claude：CLAUDE.md</text>
    <text x="638" y="300" class="small">命令、目录、边界</text>
  </g>

  <path d="M826 242 L890 242" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="892" y="132" width="240" height="220" rx="18" fill="url(#greenCard)" stroke="#34d399" stroke-opacity="0.75"/>
    <text x="920" y="178" class="node-title">4 AI 读项目</text>
    <text x="920" y="214" class="body">先列页面入口</text>
    <text x="920" y="246" class="body">先说修改计划</text>
    <text x="920" y="278" class="body">不马上改文件</text>
    <text x="920" y="312" class="mono">codex -C / claude</text>
  </g>

  <path d="M1012 352 L1012 400" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="710" y="402" width="232" height="128" rx="16" fill="#10283a" stroke="#22d3ee" stroke-opacity="0.7"/>
    <text x="738" y="444" class="node-title">5 小步修改</text>
    <text x="738" y="481" class="body">修筛选 Bug</text>
    <text x="738" y="512" class="body">新增一个按钮</text>
  </g>

  <path d="M942 466 L1002 466" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="1004" y="402" width="204" height="128" rx="16" fill="#0f2d27" stroke="#34d399" stroke-opacity="0.75"/>
    <text x="1032" y="444" class="node-title">6 验证复用</text>
    <text x="1032" y="481" class="mono">git diff</text>
    <text x="1032" y="512" class="mono">npm test</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="400" width="570" height="130" rx="16" fill="#172133" stroke="#f87171" stroke-opacity="0.62"/>
    <text x="100" y="444" class="node-title">录屏重点</text>
    <text x="100" y="482" class="body">页面能看见变化，代码能看见差异，测试能确认边界。</text>
    <text x="100" y="512" class="body">同一个项目服务 V046 Codex 和 V047 Claude Code。</text>
  </g>

  <g>
    <rect x="72" y="594" width="1136" height="60" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="96" y="632" class="small">项目模块：</text>
    <g transform="translate(188,608)">
      <rect width="64" height="30" rx="15" fill="#334155"/><text x="18" y="20" class="tag">按钮</text>
    </g>
    <g transform="translate(264,608)">
      <rect width="64" height="30" rx="15" fill="#334155"/><text x="18" y="20" class="tag">表单</text>
    </g>
    <g transform="translate(340,608)">
      <rect width="64" height="30" rx="15" fill="#334155"/><text x="18" y="20" class="tag">路由</text>
    </g>
    <g transform="translate(416,608)">
      <rect width="64" height="30" rx="15" fill="#334155"/><text x="18" y="20" class="tag">状态</text>
    </g>
    <g transform="translate(492,608)">
      <rect width="64" height="30" rx="15" fill="#334155"/><text x="18" y="20" class="tag">权限</text>
    </g>
    <g transform="translate(584,608)">
      <rect width="78" height="30" rx="15" fill="#334155"/><text x="18" y="20" class="tag">任务卡</text>
    </g>
    <g transform="translate(674,608)">
      <rect width="66" height="30" rx="15" fill="#334155"/><text x="17" y="20" class="tag">diff</text>
    </g>
    <g transform="translate(752,608)">
      <rect width="64" height="30" rx="15" fill="#334155"/><text x="18" y="20" class="tag">测试</text>
    </g>
  </g>

  <text x="72" y="682" class="small">V048 / MR-18 / 非真实业务数据</text>
</svg>
