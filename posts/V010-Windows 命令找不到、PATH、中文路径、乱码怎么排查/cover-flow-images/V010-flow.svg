<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V010 Windows 命令找不到排查流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#172033"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#243145"/>
      <stop offset="1" stop-color="#182234"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L7,4 L1,7" fill="none" stroke="#8fb3d9" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 42px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 400 20px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #b8c6d9; letter-spacing: 0; }
      .node-title { font: 700 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .node-text { font: 400 17px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #cbd5e1; letter-spacing: 0; }
      .num { font: 700 18px Arial, sans-serif; fill: #111827; }
      .tag { font: 500 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #dbeafe; letter-spacing: 0; }
      .terminal { font: 400 16px Consolas, "SFMono-Regular", Menlo, monospace; fill: #d1d5db; letter-spacing: 0; }
      .terminal-red { font: 600 16px Consolas, "SFMono-Regular", Menlo, monospace; fill: #ff7b7b; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M72 142 C280 80 418 172 595 126 C785 76 918 122 1198 72" fill="none" stroke="#2b82d9" stroke-opacity="0.22" stroke-width="2"/>
  <path d="M86 575 C260 522 421 594 588 548 C773 498 977 534 1205 472" fill="none" stroke="#ef4444" stroke-opacity="0.18" stroke-width="2"/>

  <text x="72" y="76" class="title">Windows 命令找不到：先分层，再定位</text>
  <text x="74" y="112" class="subtitle">终端输出 → where.exe / PATH → 执行策略 → Key 与日志 → 网络、权限、目录</text>

  <g transform="translate(865 45)" filter="url(#softShadow)">
    <rect x="0" y="0" width="340" height="118" rx="8" fill="#0b1220" stroke="#36445a"/>
    <circle cx="22" cy="22" r="5" fill="#ef4444"/>
    <circle cx="40" cy="22" r="5" fill="#f59e0b"/>
    <circle cx="58" cy="22" r="5" fill="#22c55e"/>
    <text x="24" y="56" class="terminal">PS&gt; codex --version</text>
    <text x="24" y="84" class="terminal-red">term 'codex' is not recognized</text>
  </g>

  <g id="nodes" filter="url(#softShadow)">
    <g transform="translate(72 190)">
      <rect width="164" height="130" rx="8" fill="url(#card)" stroke="#51617a"/>
      <circle cx="30" cy="30" r="16" fill="#93c5fd"/>
      <text x="24" y="36" class="num">1</text>
      <text x="22" y="70" class="node-title">复现现象</text>
      <text x="22" y="100" class="node-text">保留错误原文</text>
      <text x="22" y="124" class="node-text">确认终端类型</text>
    </g>
    <g transform="translate(270 190)">
      <rect width="164" height="130" rx="8" fill="url(#card)" stroke="#51617a"/>
      <circle cx="30" cy="30" r="16" fill="#fca5a5"/>
      <text x="24" y="36" class="num">2</text>
      <text x="22" y="70" class="node-title">看终端输出</text>
      <text x="22" y="100" class="node-text">命令找不到？</text>
      <text x="22" y="124" class="node-text">脚本被拦？乱码？</text>
    </g>
    <g transform="translate(468 190)">
      <rect width="164" height="130" rx="8" fill="url(#card)" stroke="#51617a"/>
      <circle cx="30" cy="30" r="16" fill="#7dd3fc"/>
      <text x="24" y="36" class="num">3</text>
      <text x="22" y="70" class="node-title">查命令位置</text>
      <text x="22" y="100" class="node-text">where.exe</text>
      <text x="22" y="124" class="node-text">当前 PATH</text>
    </g>
    <g transform="translate(666 190)">
      <rect width="164" height="130" rx="8" fill="url(#card)" stroke="#51617a"/>
      <circle cx="30" cy="30" r="16" fill="#c4b5fd"/>
      <text x="24" y="36" class="num">4</text>
      <text x="22" y="70" class="node-title">查执行策略</text>
      <text x="22" y="100" class="node-text">Get-ExecutionPolicy</text>
      <text x="22" y="124" class="node-text">配置文件分开看</text>
    </g>
    <g transform="translate(864 190)">
      <rect width="164" height="130" rx="8" fill="url(#card)" stroke="#51617a"/>
      <circle cx="30" cy="30" r="16" fill="#fde68a"/>
      <text x="24" y="36" class="num">5</text>
      <text x="22" y="70" class="node-title">查 Key / 日志</text>
      <text x="22" y="100" class="node-text">产品线别混用</text>
      <text x="22" y="124" class="node-text">权益和 /logs</text>
    </g>
    <g transform="translate(1062 190)">
      <rect width="164" height="130" rx="8" fill="url(#card)" stroke="#51617a"/>
      <circle cx="30" cy="30" r="16" fill="#86efac"/>
      <text x="24" y="36" class="num">6</text>
      <text x="22" y="70" class="node-title">查边界条件</text>
      <text x="22" y="100" class="node-text">网络 / 权限</text>
      <text x="22" y="124" class="node-text">项目目录</text>
    </g>
  </g>

  <g stroke="#8fb3d9" stroke-width="1.6" stroke-linecap="round" marker-end="url(#arrow)">
    <line x1="244" y1="255" x2="258" y2="255"/>
    <line x1="442" y1="255" x2="456" y2="255"/>
    <line x1="640" y1="255" x2="654" y2="255"/>
    <line x1="838" y1="255" x2="852" y2="255"/>
    <line x1="1036" y1="255" x2="1050" y2="255"/>
  </g>

  <g transform="translate(118 375)">
    <rect x="0" y="0" width="1044" height="132" rx="8" fill="#101827" stroke="#2f4058"/>
    <text x="28" y="42" class="terminal">PS&gt; where.exe codex</text>
    <text x="325" y="42" class="terminal">PS&gt; $env:Path -split ';'</text>
    <text x="675" y="42" class="terminal">PS&gt; Get-ExecutionPolicy -List</text>
    <text x="28" y="82" class="terminal-red">没有命令位置：先查安装和 PATH，不急着改 Key</text>
    <text x="520" y="82" class="terminal">命令能启动后：再查配置、权益、日志和网络</text>
  </g>

  <g transform="translate(72 558)">
    <rect x="0" y="0" width="1136" height="80" rx="8" fill="#172133" stroke="#32445f"/>
    <text x="28" y="32" class="subtitle">底部排查标签</text>
    <g transform="translate(27 46)">
      <rect x="0" y="-18" width="88" height="30" rx="15" fill="#24445f"/>
      <text x="17" y="3" class="tag">终端输出</text>
      <rect x="102" y="-18" width="88" height="30" rx="15" fill="#24445f"/>
      <text x="119" y="3" class="tag">where.exe</text>
      <rect x="204" y="-18" width="64" height="30" rx="15" fill="#24445f"/>
      <text x="218" y="3" class="tag">PATH</text>
      <rect x="282" y="-18" width="88" height="30" rx="15" fill="#3f2d38"/>
      <text x="299" y="3" class="tag">执行策略</text>
      <rect x="384" y="-18" width="88" height="30" rx="15" fill="#332f54"/>
      <text x="401" y="3" class="tag">配置文件</text>
      <rect x="486" y="-18" width="118" height="30" rx="15" fill="#473c21"/>
      <text x="501" y="3" class="tag">Key/API 地址</text>
      <rect x="618" y="-18" width="88" height="30" rx="15" fill="#473c21"/>
      <text x="635" y="3" class="tag">权益状态</text>
      <rect x="720" y="-18" width="72" height="30" rx="15" fill="#473c21"/>
      <text x="737" y="3" class="tag">日志页</text>
      <rect x="806" y="-18" width="64" height="30" rx="15" fill="#244734"/>
      <text x="823" y="3" class="tag">网络</text>
      <rect x="884" y="-18" width="64" height="30" rx="15" fill="#244734"/>
      <text x="901" y="3" class="tag">权限</text>
      <rect x="962" y="-18" width="88" height="30" rx="15" fill="#244734"/>
      <text x="979" y="3" class="tag">项目目录</text>
    </g>
  </g>
</svg>
