<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V054 配置后不能用八步排查路线">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101828"/>
      <stop offset="0.56" stop-color="#172033"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L7,4 L1,7" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:44px;font-weight:800;fill:#f8fafc}
      .sub{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:19px;font-weight:600;fill:#cbd5e1}
      .nodeText{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:20px;font-weight:800;fill:#0f172a;text-anchor:middle}
      .nodeHint{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;font-weight:600;fill:#475569;text-anchor:middle}
      .label{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:18px;font-weight:800;fill:#e2e8f0}
      .cmd{font-family:"SFMono-Regular","Cascadia Mono","Menlo","Consolas",monospace;font-size:16px;fill:#cbd5e1}
      .tiny{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;font-weight:700;fill:#94a3b8}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 92 H1280 M0 628 H1280" stroke="#334155" stroke-width="1" opacity="0.75"/>
  <path d="M70 142 H1210" stroke="#334155" stroke-width="1" opacity="0.35"/>
  <text x="70" y="62" class="title">配置后不能用：八步排查路线</text>
  <text x="72" y="94" class="sub">先保留证据，再按顺序定位：终端、配置、Key、权益、日志、网络、权限、目录</text>
  <g transform="translate(44,165)" filter="url(#softShadow)">
    <g>
      <rect x="0" y="0" width="137" height="112" rx="10" fill="url(#card)" stroke="#fee2e2" stroke-width="2"/>
      <circle cx="24" cy="24" r="10" fill="#ef4444"/>
      <text x="68.5" y="48" class="nodeText">复现现象</text>
      <text x="68.5" y="77" class="nodeHint">保留错误原文</text>
    </g>
    <line x1="147" y1="56" x2="176" y2="56" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(186,0)">
      <rect x="0" y="0" width="137" height="112" rx="10" fill="url(#card)" stroke="#c7d2fe" stroke-width="2"/>
      <circle cx="24" cy="24" r="10" fill="#3b82f6"/>
      <text x="68.5" y="48" class="nodeText">终端输出</text>
      <text x="68.5" y="77" class="nodeHint">状态码 / 报错</text>
    </g>
    <line x1="333" y1="56" x2="362" y2="56" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(372,0)">
      <rect x="0" y="0" width="137" height="112" rx="10" fill="url(#card)" stroke="#bae6fd" stroke-width="2"/>
      <circle cx="24" cy="24" r="10" fill="#0284c7"/>
      <text x="68.5" y="48" class="nodeText">配置文件</text>
      <text x="68.5" y="77" class="nodeHint">路径 / 字段</text>
    </g>
    <line x1="519" y1="56" x2="548" y2="56" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(558,0)">
      <rect x="0" y="0" width="137" height="112" rx="10" fill="url(#card)" stroke="#fde68a" stroke-width="2"/>
      <circle cx="24" cy="24" r="10" fill="#f59e0b"/>
      <text x="68.5" y="48" class="nodeText">Key/API</text>
      <text x="68.5" y="77" class="nodeHint">完整性 / 地址</text>
    </g>
    <line x1="705" y1="56" x2="734" y2="56" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(744,0)">
      <rect x="0" y="0" width="137" height="112" rx="10" fill="url(#card)" stroke="#bbf7d0" stroke-width="2"/>
      <circle cx="24" cy="24" r="10" fill="#22c55e"/>
      <text x="68.5" y="48" class="nodeText">权益状态</text>
      <text x="68.5" y="77" class="nodeHint">额度 / 限流</text>
    </g>
    <line x1="891" y1="56" x2="920" y2="56" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(930,0)">
      <rect x="0" y="0" width="137" height="112" rx="10" fill="url(#card)" stroke="#fecaca" stroke-width="2"/>
      <circle cx="24" cy="24" r="10" fill="#ef4444"/>
      <text x="68.5" y="48" class="nodeText">日志页</text>
      <text x="68.5" y="77" class="nodeHint">是否到服务端</text>
    </g>
    <line x1="1077" y1="56" x2="1106" y2="56" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(1116,0)">
      <rect x="0" y="0" width="120" height="112" rx="10" fill="url(#card)" stroke="#ddd6fe" stroke-width="2"/>
      <circle cx="24" cy="24" r="10" fill="#8b5cf6"/>
      <text x="60" y="42" class="nodeText">网络</text>
      <text x="60" y="68" class="nodeText">权限</text>
      <text x="60" y="92" class="nodeHint">项目目录</text>
    </g>
  </g>
  <g transform="translate(70,335)">
    <rect x="0" y="0" width="545" height="190" rx="12" fill="#0b1220" stroke="#334155"/>
    <text x="28" y="42" class="label">Codex 先查这些</text>
    <text x="28" y="78" class="cmd">$ codex --version</text>
    <text x="28" y="110" class="cmd">$ codex login status</text>
    <text x="28" y="142" class="cmd">$ codex doctor --summary</text>
    <text x="28" y="174" class="cmd">~/.codex/config.toml  +  -C/--cd / --add-dir / --sandbox</text>
  </g>
  <g transform="translate(665,335)">
    <rect x="0" y="0" width="545" height="190" rx="12" fill="#0b1220" stroke="#334155"/>
    <text x="28" y="42" class="label">Claude Code 先查这些</text>
    <text x="28" y="78" class="cmd">$ claude --version</text>
    <text x="28" y="110" class="cmd">$ claude auth status --text</text>
    <text x="28" y="142" class="cmd">$ claude doctor</text>
    <text x="28" y="174" class="cmd">~/.claude/settings.json  +  permissions / add-dir / debug-file</text>
  </g>
  <g transform="translate(70,580)">
    <rect x="0" y="-28" width="1140" height="52" rx="26" fill="#111827" stroke="#475569"/>
    <text x="30" y="5" class="tiny">底部排查标签：</text>
    <text x="150" y="5" class="tiny">终端输出</text>
    <text x="270" y="5" class="tiny">配置文件</text>
    <text x="390" y="5" class="tiny">Key/API 地址</text>
    <text x="540" y="5" class="tiny">权益状态</text>
    <text x="660" y="5" class="tiny">日志页</text>
    <text x="760" y="5" class="tiny">网络</text>
    <text x="850" y="5" class="tiny">权限</text>
    <text x="940" y="5" class="tiny">项目目录</text>
  </g>
  <text x="70" y="674" class="tiny">排查顺序：终端、配置、Key、权益、日志、网络、权限。</text>
</svg>

