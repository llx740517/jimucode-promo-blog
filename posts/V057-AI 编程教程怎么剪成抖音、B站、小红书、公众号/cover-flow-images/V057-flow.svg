<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V057 AI 编程教程平台拆条流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#182033"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="15" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L9 5 L0 10" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 38px; font-weight: 850; fill: #f8fafc; }
      .sub { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 18px; fill: #bdc7d6; }
      .node-title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 21px; font-weight: 800; fill: #f8fafc; }
      .node-text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 15px; font-weight: 620; fill: #dbe4ef; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 13px; fill: #94a3b8; }
      .tag { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #e0f2fe; }
      .box { rx: 16; stroke-width: 1.2; filter: url(#shadow); }
      .line { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .pill { fill: rgba(30,41,59,.86); stroke: #40516a; stroke-width: 1; rx: 15; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.16">
    <path d="M80 134 H1200" stroke="#64748b"/>
    <path d="M80 596 H1200" stroke="#64748b"/>
    <path d="M182 90 V620" stroke="#64748b"/>
    <path d="M1100 90 V620" stroke="#64748b"/>
  </g>
  <text x="78" y="78" class="title">AI 编程教程平台拆条流程</text>
  <text x="78" y="110" class="sub">一条母素材，重新包装成抖音、B站、小红书、公众号四个版本</text>
  <text x="1066" y="78" class="small">V057 / MR-22</text>

  <g transform="translate(68 180)">
    <rect class="box" width="174" height="140" fill="#12313b" stroke="#22d3ee"/>
    <text x="22" y="40" class="node-title">母素材归档</text>
    <text x="22" y="72" class="node-text">横屏录屏</text>
    <text x="22" y="96" class="node-text">截图 / 流程图</text>
    <text x="22" y="120" class="node-text">封面 / 文案</text>
  </g>
  <path class="line" d="M252 250 H318"/>

  <g transform="translate(328 180)">
    <rect class="box" width="174" height="140" fill="#3a2538" stroke="#f472b6"/>
    <text x="22" y="40" class="node-title">抖音竖屏</text>
    <text x="22" y="72" class="node-text">先给结果</text>
    <text x="22" y="96" class="node-text">放大关键操作</text>
    <text x="22" y="120" class="node-text">短节奏</text>
  </g>
  <path class="line" d="M512 250 H578"/>

  <g transform="translate(588 180)">
    <rect class="box" width="174" height="140" fill="#27304b" stroke="#818cf8"/>
    <text x="22" y="40" class="node-title">B站横屏</text>
    <text x="22" y="72" class="node-text">完整流程</text>
    <text x="22" y="96" class="node-text">章节标题</text>
    <text x="22" y="120" class="node-text">保留上下文</text>
  </g>
  <path class="line" d="M772 250 H838"/>

  <g transform="translate(848 180)">
    <rect class="box" width="174" height="140" fill="#1f3a2c" stroke="#34d399"/>
    <text x="22" y="40" class="node-title">小红书图文</text>
    <text x="22" y="72" class="node-text">问题图</text>
    <text x="22" y="96" class="node-text">步骤图</text>
    <text x="22" y="120" class="node-text">踩坑提醒</text>
  </g>
  <path class="line" d="M935 330 V385"/>

  <g transform="translate(742 395)">
    <rect class="box" width="218" height="128" fill="#3b2d1a" stroke="#fbbf24"/>
    <text x="22" y="42" class="node-title">公众号长文</text>
    <text x="22" y="76" class="node-text">背景 / 截图说明</text>
    <text x="22" y="102" class="node-text">清单和边界</text>
  </g>
  <path class="line" d="M732 459 H660"/>

  <g transform="translate(432 395)">
    <rect class="box" width="218" height="128" fill="#172a37" stroke="#38bdf8"/>
    <text x="22" y="42" class="node-title">发布检查</text>
    <text x="22" y="76" class="node-text">标题 / 封面 / 标签</text>
    <text x="22" y="102" class="node-text">简介 / 素材 / 入口确认</text>
  </g>

  <g transform="translate(174 606)">
    <rect class="pill" x="0" y="0" width="76" height="32"/>
    <text x="20" y="22" class="tag">横屏</text>
    <rect class="pill" x="92" y="0" width="76" height="32"/>
    <text x="112" y="22" class="tag">竖屏</text>
    <rect class="pill" x="184" y="0" width="92" height="32"/>
    <text x="204" y="22" class="tag">步骤图</text>
    <rect class="pill" x="292" y="0" width="76" height="32"/>
    <text x="312" y="22" class="tag">长文</text>
    <rect class="pill" x="384" y="0" width="76" height="32"/>
    <text x="404" y="22" class="tag">标题</text>
    <rect class="pill" x="476" y="0" width="76" height="32"/>
    <text x="496" y="22" class="tag">封面</text>
    <rect class="pill" x="568" y="0" width="76" height="32"/>
    <text x="588" y="22" class="tag">标签</text>
    <rect class="pill" x="660" y="0" width="76" height="32"/>
    <text x="680" y="22" class="tag">素材</text>
  </g>
</svg>

