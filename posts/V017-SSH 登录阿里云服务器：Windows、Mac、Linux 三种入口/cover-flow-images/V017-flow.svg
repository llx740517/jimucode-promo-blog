<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1720"/>
      <stop offset="0.52" stop-color="#14242b"/>
      <stop offset="1" stop-color="#24251d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 800 42px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #f4f7f2; }
      .subtitle { font: 500 18px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #c2cec7; }
      .nodeTitle { font: 800 22px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #f4f7f2; }
      .nodeText { font: 600 15px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #c9d6cf; }
      .code { font: 600 13px "SFMono-Regular", Menlo, Consolas, monospace; fill: #dde8e0; }
      .tag { font: 700 14px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #d9e6dd; }
      .small { font: 500 13px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #9fb0a7; }
      .line { stroke: #8aa097; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrow { fill: #8aa097; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="42" y="38" width="1196" height="644" rx="22" fill="#0c1117" opacity="0.44"/>
  <text x="76" y="92" class="title">SSH 登录阿里云服务器：Windows / Mac / Linux 三种入口</text>
  <text x="78" y="126" class="subtitle">先确认 ECS、安全组和凭证，再按本地系统选择 SSH 或 Workbench</text>

  <g filter="url(#shadow)">
    <rect x="76" y="172" width="166" height="154" rx="18" fill="#18242d" stroke="#344552"/>
    <circle cx="106" cy="206" r="13" fill="#7dd3fc"/>
    <text x="128" y="214" class="nodeTitle">ECS 实例</text>
    <text x="100" y="252" class="nodeText">运行中</text>
    <text x="100" y="278" class="nodeText">Linux 系统</text>
    <text x="100" y="304" class="nodeText">公网 IP 已隐藏</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="292" y="172" width="178" height="154" rx="18" fill="#25271f" stroke="#55523b"/>
    <circle cx="322" cy="206" r="13" fill="#fde68a"/>
    <text x="344" y="214" class="nodeTitle">安全组</text>
    <text x="316" y="252" class="nodeText">入方向 TCP 22</text>
    <text x="316" y="278" class="nodeText">来源限制当前 IP</text>
    <text x="316" y="304" class="nodeText">录完收紧规则</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="172" width="178" height="154" rx="18" fill="#242331" stroke="#48475d"/>
    <circle cx="550" cy="206" r="13" fill="#c4b5fd"/>
    <text x="572" y="214" class="nodeTitle">登录三要素</text>
    <text x="544" y="252" class="nodeText">公网 IP</text>
    <text x="544" y="278" class="nodeText">用户名</text>
    <text x="544" y="304" class="nodeText">密码或密钥</text>
  </g>

  <path class="line" d="M242 249 H284"/><polygon class="arrow" points="284,249 274,243 274,255"/>
  <path class="line" d="M470 249 H512"/><polygon class="arrow" points="512,249 502,243 502,255"/>

  <g filter="url(#shadow)">
    <rect x="770" y="120" width="198" height="116" rx="18" fill="#1a2730" stroke="#3d5360"/>
    <text x="800" y="158" class="nodeTitle">Windows</text>
    <text x="800" y="188" class="nodeText">PowerShell / OpenSSH</text>
    <text x="800" y="214" class="code">ssh -i C:\...\key 用户@IP</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="992" y="120" width="190" height="116" rx="18" fill="#1d2a24" stroke="#40584a"/>
    <text x="1022" y="158" class="nodeTitle">Workbench</text>
    <text x="1022" y="188" class="nodeText">浏览器远程入口</text>
    <text x="1022" y="214" class="nodeText">需录屏前实测</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="770" y="276" width="198" height="116" rx="18" fill="#261f25" stroke="#57424d"/>
    <text x="800" y="314" class="nodeTitle">macOS</text>
    <text x="800" y="344" class="code">chmod 400 key.pem</text>
    <text x="800" y="370" class="code">ssh -i key.pem 用户@IP</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="992" y="276" width="190" height="116" rx="18" fill="#202821" stroke="#475644"/>
    <text x="1022" y="314" class="nodeTitle">Linux</text>
    <text x="1022" y="344" class="code">chmod 400 key.pem</text>
    <text x="1022" y="370" class="code">ssh -i key.pem 用户@IP</text>
  </g>

  <path class="line" d="M698 249 C724 249 734 178 762 178"/><polygon class="arrow" points="762,178 751,174 755,185"/>
  <path class="line" d="M698 249 C724 249 734 332 762 332"/><polygon class="arrow" points="762,332 752,326 752,338"/>

  <g filter="url(#shadow)">
    <rect x="388" y="430" width="504" height="86" rx="18" fill="#101923" stroke="#304352"/>
    <text x="424" y="464" class="nodeTitle">登录后只做验证</text>
    <text x="424" y="494" class="code">whoami  hostname  pwd  uname -a  exit</text>
  </g>
  <path class="line" d="M868 392 C830 424 760 438 900 438"/>
  <polygon class="arrow" points="900,438 890,432 890,444"/>

  <rect x="76" y="560" width="1128" height="58" rx="16" fill="#151b20" stroke="#2f3a40"/>
  <text x="102" y="594" class="small">排查顺序</text>
  <rect x="190" y="574" width="86" height="28" rx="14" fill="#20313a"/><text x="210" y="594" class="tag">终端输出</text>
  <rect x="288" y="574" width="90" height="28" rx="14" fill="#383420"/><text x="304" y="594" class="tag">安全组 22</text>
  <rect x="390" y="574" width="78" height="28" rx="14" fill="#263241"/><text x="408" y="594" class="tag">公网 IP</text>
  <rect x="480" y="574" width="72" height="28" rx="14" fill="#2c2938"/><text x="500" y="594" class="tag">用户名</text>
  <rect x="564" y="574" width="86" height="28" rx="14" fill="#352832"/><text x="582" y="594" class="tag">密钥权限</text>
  <rect x="662" y="574" width="86" height="28" rx="14" fill="#20332a"/><text x="680" y="594" class="tag">实例状态</text>
  <rect x="760" y="574" width="58" height="28" rx="14" fill="#243135"/><text x="774" y="594" class="tag">网络</text>
  <rect x="830" y="574" width="86" height="28" rx="14" fill="#302c25"/><text x="848" y="594" class="tag">项目目录</text>
</svg>
