<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V053 Claude Code 代码审查闭环">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="52%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#231425"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20324d"/>
      <stop offset="100%" stop-color="#172133"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123a36"/>
      <stop offset="100%" stop-color="#102129"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2,2 L9,6 L2,10" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 40px; font-weight: 900; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: 700; fill: #cbd5e1; letter-spacing: 0; }
      .node-title { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 23px; font-weight: 900; fill: #f8fafc; letter-spacing: 0; }
      .body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; font-weight: 720; fill: #dbeafe; letter-spacing: 0; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; font-weight: 720; fill: #aab7c8; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; font-weight: 850; fill: #d1fae5; letter-spacing: 0; }
      .tag { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; font-weight: 850; fill: #e5e7eb; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.18">
    <path d="M72 142 C245 56, 407 85, 568 148 S862 192, 1018 94 S1134 74, 1208 140" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <path d="M80 586 C221 520, 356 548, 482 620" fill="none" stroke="#34d399" stroke-width="2"/>
    <path d="M804 628 C925 536, 1082 526, 1196 612" fill="none" stroke="#f87171" stroke-width="2"/>
  </g>

  <text x="72" y="68" class="title">Claude Code 代码审查闭环</text>
  <text x="72" y="104" class="subtitle">看差异 → 限权限 → Claude Code 审查 → 找风险 → 补测试 → 跑验证</text>

  <g filter="url(#shadow)">
    <rect x="72" y="158" width="188" height="166" rx="16" fill="url(#cardBlue)" stroke="#60a5fa" stroke-opacity="0.65"/>
    <text x="96" y="202" class="node-title">1 看差异</text>
    <text x="96" y="238" class="mono">git status</text>
    <text x="96" y="268" class="mono">git diff</text>
    <text x="96" y="298" class="body">确认文件范围</text>
  </g>

  <path d="M260 242 L318 242" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="320" y="132" width="218" height="220" rx="18" fill="#211d2d" stroke="#fb923c" stroke-opacity="0.7"/>
    <text x="348" y="178" class="node-title">2 限制权限</text>
    <text x="348" y="214" class="body">允许：Read</text>
    <text x="348" y="246" class="body">允许：git diff</text>
    <text x="348" y="278" class="body">允许：测试命令</text>
    <text x="348" y="310" class="body">拒绝：.env / secrets</text>
  </g>

  <path d="M538 242 L608 242" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="610" y="158" width="224" height="166" rx="16" fill="#1d2440" stroke="#a78bfa" stroke-opacity="0.72"/>
    <text x="636" y="202" class="node-title">3 Claude 审查</text>
    <text x="636" y="240" class="body">/code-review</text>
    <text x="636" y="270" class="body">审查当前 diff</text>
    <text x="636" y="300" class="small">ultrareview 可选</text>
  </g>

  <path d="M834 242 L892 242" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="894" y="132" width="238" height="220" rx="18" fill="#3a1722" stroke="#f87171" stroke-opacity="0.72"/>
    <text x="922" y="178" class="node-title">4 找风险</text>
    <text x="922" y="214" class="body">边界值</text>
    <text x="922" y="246" class="body">错误处理</text>
    <text x="922" y="278" class="body">硬编码</text>
    <text x="922" y="310" class="body">缺失测试</text>
  </g>

  <path d="M1012 352 L1012 400" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="714" y="402" width="226" height="128" rx="16" fill="#10283a" stroke="#22d3ee" stroke-opacity="0.7"/>
    <text x="742" y="444" class="node-title">5 只补测试</text>
    <text x="742" y="481" class="body">不重写模块</text>
    <text x="742" y="512" class="body">只补失败点</text>
  </g>

  <path d="M940 466 L1002 466" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="1004" y="402" width="204" height="128" rx="16" fill="url(#cardGreen)" stroke="#34d399" stroke-opacity="0.75"/>
    <text x="1032" y="444" class="node-title">6 验证复查</text>
    <text x="1032" y="481" class="mono">npm test</text>
    <text x="1032" y="512" class="mono">git diff</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="400" width="570" height="130" rx="16" fill="#172133" stroke="#60a5fa" stroke-opacity="0.62"/>
    <text x="100" y="444" class="node-title">录屏重点</text>
    <text x="100" y="482" class="body">Claude Code 建议不算完成，必须落到测试和二次 diff。</text>
    <text x="100" y="512" class="body">PR、Git 远程、内部风险全程隐藏。</text>
  </g>

  <rect x="72" y="594" width="1136" height="60" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="96" y="632" class="small">审查标签：</text>
  <g transform="translate(188,608)"><rect width="58" height="30" rx="15" fill="#334155"/><text x="15" y="20" class="tag">diff</text></g>
  <g transform="translate(258,608)"><rect width="82" height="30" rx="15" fill="#334155"/><text x="14" y="20" class="tag">风险列表</text></g>
  <g transform="translate(352,608)"><rect width="78" height="30" rx="15" fill="#334155"/><text x="14" y="20" class="tag">补测试</text></g>
  <g transform="translate(442,608)"><rect width="82" height="30" rx="15" fill="#334155"/><text x="14" y="20" class="tag">测试通过</text></g>
  <g transform="translate(536,608)"><rect width="84" height="30" rx="15" fill="#334155"/><text x="14" y="20" class="tag">二次diff</text></g>
  <g transform="translate(632,608)"><rect width="80" height="30" rx="15" fill="#334155"/><text x="14" y="20" class="tag">PR隐藏</text></g>

  <text x="72" y="682" class="small">V053</text>
</svg>
