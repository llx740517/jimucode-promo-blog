<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V043 写新功能前给 AI 约束流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="0.55" stop-color="#172033"/>
      <stop offset="1" stop-color="#18251f"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2c41"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="task" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2435"/>
      <stop offset="1" stop-color="#151827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L9,6 L2,10" fill="none" stroke="#aab3c2" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 800 40px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #cbd5e1; }
      .nodeTitle { font: 800 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #f8fafc; }
      .nodeText { font: 520 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #cbd5e1; }
      .code { font: 700 16px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #d1fae5; }
      .chip { font: 700 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #e5e7eb; }
      .tiny { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #a7b4c5; }
      .arrow { stroke: #aab3c2; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M76 138 C220 62 330 88 460 138 C592 188 700 180 832 112 C978 36 1084 74 1192 144" fill="none" stroke="#22d3ee" stroke-opacity="0.14" stroke-width="2"/>
  <path d="M80 588 C220 530 360 548 496 602 C640 660 768 648 918 590 C1050 538 1138 550 1198 594" fill="none" stroke="#34d399" stroke-opacity="0.14" stroke-width="2"/>

  <text x="72" y="72" class="title">写新功能前：先给 AI 约束</text>
  <text x="74" y="106" class="subtitle">读项目 → 提任务 → AI 修改 → 看 diff → 运行测试 → 总结边界</text>

  <g filter="url(#shadow)">
    <rect x="72" y="164" width="180" height="150" rx="14" fill="url(#node)" stroke="#60a5fa" stroke-opacity="0.55"/>
    <text x="96" y="206" class="nodeTitle">1 读项目</text>
    <text x="96" y="242" class="nodeText">规则文件</text>
    <text x="96" y="270" class="nodeText">相关源码</text>
    <text x="96" y="298" class="nodeText">现有测试</text>
  </g>

  <line x1="252" y1="239" x2="322" y2="239" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="326" y="132" width="228" height="214" rx="16" fill="url(#task)" stroke="#fb923c" stroke-opacity="0.62"/>
    <text x="352" y="176" class="nodeTitle">2 提任务卡</text>
    <text x="352" y="214" class="nodeText">目标：加一个小功能</text>
    <text x="352" y="244" class="nodeText">范围：只改允许文件</text>
    <text x="352" y="274" class="nodeText">不能改：配置 / 鉴权</text>
    <text x="352" y="304" class="nodeText">验收：测试和结果</text>
  </g>

  <line x1="554" y1="239" x2="626" y2="239" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="630" y="164" width="188" height="150" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-opacity="0.55"/>
    <text x="654" y="206" class="nodeTitle">3 AI 修改</text>
    <text x="654" y="242" class="nodeText">先复述方案</text>
    <text x="654" y="270" class="nodeText">小步改动</text>
    <text x="654" y="298" class="nodeText">不扩大范围</text>
  </g>

  <line x1="818" y1="239" x2="888" y2="239" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="892" y="144" width="228" height="190" rx="16" fill="#132a2a" stroke="#34d399" stroke-opacity="0.58"/>
    <text x="918" y="188" class="nodeTitle">4 看 diff</text>
    <text x="918" y="226" class="code">git diff -- src tests</text>
    <text x="918" y="258" class="nodeText">只看允许文件</text>
    <text x="918" y="288" class="nodeText">越界就停</text>
  </g>

  <line x1="1006" y1="334" x2="1006" y2="398" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="804" y="402" width="316" height="126" rx="16" fill="#142033" stroke="#22d3ee" stroke-opacity="0.50"/>
    <text x="832" y="446" class="nodeTitle">5 运行测试</text>
    <text x="832" y="482" class="code">npm test / pytest</text>
    <text x="832" y="512" class="nodeText">通过、失败、下一步</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="400" width="600" height="128" rx="16" fill="#1b2636" stroke="#ef4444" stroke-opacity="0.42"/>
    <text x="100" y="442" class="nodeTitle">录屏重点</text>
    <text x="100" y="478" class="nodeText">Codex：AGENTS.md + codex exec；Claude Code：CLAUDE.md + 工具权限。</text>
    <text x="100" y="508" class="nodeText">AI 说完成不算，必须看 diff 和验证命令。</text>
  </g>

  <line x1="672" y1="464" x2="798" y2="464" class="arrow"/>
  <line x1="724" y1="314" x2="724" y2="464" stroke="#aab3c2" stroke-width="1.4" stroke-opacity="0.72" fill="none"/>
  <line x1="724" y1="464" x2="798" y2="464" class="arrow"/>

  <g>
    <rect x="72" y="592" width="1136" height="62" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="96" y="628" class="tiny">任务卡六项：</text>
    <g transform="translate(190 606)">
      <rect width="50" height="30" rx="15" fill="#273449"/><text x="25" y="20" text-anchor="middle" class="chip">目标</text>
    </g>
    <g transform="translate(252 606)">
      <rect width="50" height="30" rx="15" fill="#273449"/><text x="25" y="20" text-anchor="middle" class="chip">范围</text>
    </g>
    <g transform="translate(314 606)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">不能改</text>
    </g>
    <g transform="translate(404 606)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">验收标准</text>
    </g>
    <g transform="translate(494 606)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">验证命令</text>
    </g>
    <g transform="translate(584 606)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">停止条件</text>
    </g>
  </g>

  <text x="72" y="682" class="tiny">V043</text>
</svg>
