    <text x="563" y="265" text-anchor="middle" fill="#15803D" font-size="16" font-weight="700">正确结果</text>
    <rect x="690" y="190" width="154" height="104" rx="18" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
