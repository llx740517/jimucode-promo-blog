    <line x1="438" y1="242" x2="478" y2="242"/>
    <line x1="642" y1="242" x2="682" y2="242"/>
    <line x1="846" y1="242" x2="886" y2="242"/>
    <line x1="1050" y1="242" x2="1090" y2="242"/>
