    <text x="148" y="496" fill="#94A3B8" font-size="16">入口和参数按录屏前当前版本实测确认</text>
    <rect x="704" y="384" width="458" height="130" rx="20" fill="#111827"/>
    <text x="734" y="430" fill="#F8FAFC" font-size="25" font-weight="900">Claude Code</text>
    <text x="734" y="467" fill="#CBD5E1" font-size="18">同一问题卡：注意权限提示、计划和验证</text>
    <text x="734" y="496" fill="#94A3B8" font-size="16">`claude` / `claude "query"` / `claude -p` 按场景选</text>
  </g>
