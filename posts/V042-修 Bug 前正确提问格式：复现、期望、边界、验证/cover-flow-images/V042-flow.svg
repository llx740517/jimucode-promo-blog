    <text x="767" y="265" text-anchor="middle" fill="#C2410C" font-size="16" font-weight="700">只改相关处</text>
    <rect x="894" y="190" width="154" height="104" rx="18" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
