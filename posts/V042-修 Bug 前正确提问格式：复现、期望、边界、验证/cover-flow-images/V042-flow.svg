    <text x="971" y="265" text-anchor="middle" fill="#6D28D9" font-size="16" font-weight="700">先解释再改</text>
    <rect x="1098" y="190" width="104" height="104" rx="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="1150" y="235" text-anchor="middle" fill="#0F172A" font-size="22" font-weight="900">验证</text>
    <text x="1150" y="265" text-anchor="middle" fill="#1D4ED8" font-size="16" font-weight="700">diff + 测试</text>
  </g>
  <g stroke="#64748B" stroke-width="2.2" marker-end="url(#arrow)">
