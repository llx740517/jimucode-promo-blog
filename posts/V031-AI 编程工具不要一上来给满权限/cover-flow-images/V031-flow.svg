<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V031 AI 编程权限安全流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101624"/>
      <stop offset="0.55" stop-color="#182338"/>
      <stop offset="1" stop-color="#22202f"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L7,4.5 L1,8" fill="none" stroke="#9fb0c9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 42px; font-weight: 800; fill: #f8fbff; letter-spacing: 0; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 20px; fill: #bfd0e8; letter-spacing: 0; }
      .nodeTitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 24px; font-weight: 760; fill: #ffffff; letter-spacing: 0; }
      .nodeText { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; fill: #d7e0ee; letter-spacing: 0; }
      .code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 15px; fill: #b9f3dc; }
      .tag { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 15px; fill: #e8eef8; letter-spacing: 0; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #9fb0c9; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 560 C180 520 290 620 450 580 C650 530 690 430 890 470 C1070 505 1160 595 1280 545 L1280 720 L0 720 Z" fill="#22314a" opacity="0.38"/>
  <path d="M98 92 H1182" stroke="#3a4d6d" stroke-width="1"/>

  <text x="98" y="64" class="title">AI 编程权限安全流程</text>
  <text x="98" y="101" class="subtitle">先只读 / 计划，再小步放开；审批前看工具、路径、风险词</text>

  <g transform="translate(82 162)" filter="url(#shadow)">
    <rect x="0" y="0" width="172" height="170" rx="8" fill="url(#card)" stroke="#445676"/>
    <circle cx="32" cy="34" r="15" fill="#ffcf66"/>
    <text x="56" y="42" class="nodeTitle">识别风险</text>
    <text x="24" y="83" class="nodeText">.env / Key</text>
    <text x="24" y="111" class="nodeText">删除 / 联网</text>
    <text x="24" y="139" class="nodeText">权限命令</text>
  </g>

  <g transform="translate(276 162)" filter="url(#shadow)">
    <rect x="0" y="0" width="184" height="170" rx="8" fill="url(#card)" stroke="#4b83b7"/>
    <circle cx="32" cy="34" r="15" fill="#55c7f2"/>
    <text x="56" y="42" class="nodeTitle">只读/计划</text>
    <text x="24" y="82" class="code">Codex read-only</text>
    <text x="24" y="112" class="code">Claude plan</text>
    <text x="24" y="140" class="nodeText">先不要改文件</text>
  </g>

  <g transform="translate(482 162)" filter="url(#shadow)">
    <rect x="0" y="0" width="184" height="170" rx="8" fill="url(#card)" stroke="#5a6f92"/>
    <circle cx="32" cy="34" r="15" fill="#9aa7ff"/>
    <text x="56" y="42" class="nodeTitle">列计划</text>
    <text x="24" y="83" class="nodeText">读哪些文件</text>
    <text x="24" y="111" class="nodeText">准备改哪里</text>
    <text x="24" y="139" class="nodeText">风险先说清</text>
  </g>

  <g transform="translate(688 162)" filter="url(#shadow)">
    <rect x="0" y="0" width="184" height="170" rx="8" fill="url(#card)" stroke="#5da584"/>
    <circle cx="32" cy="34" r="15" fill="#50d18d"/>
    <text x="56" y="42" class="nodeTitle">小步放开</text>
    <text x="24" y="83" class="nodeText">一个任务</text>
    <text x="24" y="111" class="nodeText">一个目录</text>
    <text x="24" y="139" class="nodeText">一个文件范围</text>
  </g>

  <g transform="translate(894 162)" filter="url(#shadow)">
    <rect x="0" y="0" width="184" height="170" rx="8" fill="url(#card)" stroke="#c77870"/>
    <circle cx="32" cy="34" r="15" fill="#ff6b6b"/>
    <text x="56" y="42" class="nodeTitle">审批停住</text>
    <text x="24" y="83" class="nodeText">工具 / 路径</text>
    <text x="24" y="111" class="nodeText">参数 / 风险词</text>
    <text x="24" y="139" class="nodeText">不确定就拒绝</text>
  </g>

  <g transform="translate(492 390)" filter="url(#shadow)">
    <rect x="0" y="0" width="296" height="112" rx="8" fill="#0f1726" stroke="#5f7396"/>
    <text x="26" y="43" class="nodeTitle">diff / test 确认</text>
    <text x="26" y="76" class="code">git diff  +  npm test</text>
  </g>

  <path d="M254 247 H268" stroke="#9fb0c9" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M460 247 H474" stroke="#9fb0c9" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M666 247 H680" stroke="#9fb0c9" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M872 247 H886" stroke="#9fb0c9" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M986 336 C980 392 840 446 796 446" stroke="#9fb0c9" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M492 446 C430 446 337 407 344 336" stroke="#9fb0c9" stroke-width="2" marker-end="url(#arrow)" fill="none" opacity="0.66"/>

  <g transform="translate(98 560)">
    <text x="0" y="-18" class="small">录屏底部提示：看到审批提示，先看这些关键词</text>
    <rect x="0" y="0" width="94" height="34" rx="17" fill="#263855" stroke="#465c7c"/><text x="22" y="23" class="tag">只读</text>
    <rect x="106" y="0" width="86" height="34" rx="17" fill="#263855" stroke="#465c7c"/><text x="129" y="23" class="tag">plan</text>
    <rect x="204" y="0" width="118" height="34" rx="17" fill="#263855" stroke="#465c7c"/><text x="228" y="23" class="tag">sandbox</text>
    <rect x="334" y="0" width="124" height="34" rx="17" fill="#263855" stroke="#465c7c"/><text x="358" y="23" class="tag">approval</text>
    <rect x="470" y="0" width="104" height="34" rx="17" fill="#263855" stroke="#465c7c"/><text x="494" y="23" class="tag">--tools</text>
    <rect x="586" y="0" width="88" height="34" rx="17" fill="#452e3b" stroke="#7b4d58"/><text x="609" y="23" class="tag">.env</text>
    <rect x="686" y="0" width="102" height="34" rx="17" fill="#452e3b" stroke="#7b4d58"/><text x="708" y="23" class="tag">secrets</text>
    <rect x="800" y="0" width="72" height="34" rx="17" fill="#4c2b2f" stroke="#8d4a4a"/><text x="826" y="23" class="tag">rm</text>
    <rect x="884" y="0" width="78" height="34" rx="17" fill="#4c2b2f" stroke="#8d4a4a"/><text x="906" y="23" class="tag">curl</text>
    <rect x="974" y="0" width="102" height="34" rx="17" fill="#24423b" stroke="#3c7464"/><text x="996" y="23" class="tag">git diff</text>
    <rect x="1088" y="0" width="78" height="34" rx="17" fill="#24423b" stroke="#3c7464"/><text x="1112" y="23" class="tag">test</text>
  </g>
</svg>

