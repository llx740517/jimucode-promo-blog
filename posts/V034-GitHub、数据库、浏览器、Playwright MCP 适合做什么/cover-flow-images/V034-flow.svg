<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V034 MCP 场景判断与调用验证流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.52" stop-color="#f9faf7"/>
      <stop offset="1" stop-color="#fff8f1"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L7 4.5 L1 8" fill="none" stroke="#5b6472" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .title { font-size: 36px; font-weight: 800; fill: #111827; }
      .subtitle { font-size: 17px; fill: #5b6472; }
      .node-title { font-size: 21px; font-weight: 780; fill: #111827; }
      .node-body { font-size: 15px; fill: #566070; }
      .tag { font-size: 14px; font-weight: 700; fill: #243044; }
      .hint { font-size: 15px; fill: #475569; }
      .note { font-size: 13px; fill: #64748b; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="34" width="1208" height="652" rx="24" fill="#ffffff" stroke="#d7dee8" stroke-width="1.2"/>

  <text x="70" y="88" class="title">MCP 场景判断与调用验证</text>
  <text x="70" y="119" class="subtitle">先判断工具场景，再配置 MCP，最后按输出和权限验证</text>

  <g filter="url(#softShadow)">
    <rect x="70" y="170" width="188" height="172" rx="16" fill="#ffffff" stroke="#b8c5d6"/>
    <rect x="86" y="188" width="44" height="44" rx="12" fill="#111827"/>
    <text x="99" y="218" font-size="25" font-weight="800" fill="#ffffff">1</text>
    <text x="86" y="263" class="node-title">本地工具</text>
    <text x="86" y="292" class="node-body">GitHub / 数据库</text>
    <text x="86" y="317" class="node-body">浏览器 / Playwright</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="308" y="170" width="188" height="172" rx="16" fill="#f4fffb" stroke="#7ac7a8"/>
    <rect x="324" y="188" width="44" height="44" rx="12" fill="#0f8b66"/>
    <text x="337" y="218" font-size="25" font-weight="800" fill="#ffffff">2</text>
    <text x="324" y="263" class="node-title">MCP Server</text>
    <text x="324" y="292" class="node-body">HTTP 远程服务</text>
    <text x="324" y="317" class="node-body">stdio 本地进程</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="546" y="170" width="188" height="172" rx="16" fill="#fffaf0" stroke="#e3b35b"/>
    <rect x="562" y="188" width="44" height="44" rx="12" fill="#c47b11"/>
    <text x="575" y="218" font-size="25" font-weight="800" fill="#ffffff">3</text>
    <text x="562" y="263" class="node-title">配置添加</text>
    <text x="562" y="292" class="node-body">CLI / .mcp.json</text>
    <text x="562" y="317" class="node-body">env / header</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="784" y="170" width="188" height="172" rx="16" fill="#f5f8ff" stroke="#94a8e8"/>
    <rect x="800" y="188" width="44" height="44" rx="12" fill="#3e63dd"/>
    <text x="813" y="218" font-size="25" font-weight="800" fill="#ffffff">4</text>
    <text x="800" y="263" class="node-title">AI 工具</text>
    <text x="800" y="292" class="node-body">Codex</text>
    <text x="800" y="317" class="node-body">Claude Code</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1022" y="170" width="188" height="172" rx="16" fill="#fff6f7" stroke="#e89aa8"/>
    <rect x="1038" y="188" width="44" height="44" rx="12" fill="#c8334d"/>
    <text x="1051" y="218" font-size="25" font-weight="800" fill="#ffffff">5</text>
    <text x="1038" y="263" class="node-title">调用验证</text>
    <text x="1038" y="292" class="node-body">list / get / /mcp</text>
    <text x="1038" y="317" class="node-body">失败点回看</text>
  </g>

  <path d="M260 256 H300" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M498 256 H538" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M736 256 H776" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M974 256 H1014" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <text x="72" y="403" class="hint">四类场景怎么判断</text>

  <g>
    <rect x="70" y="428" width="262" height="92" rx="14" fill="#111827"/>
    <text x="94" y="463" font-size="24" font-weight="800" fill="#ffffff">GitHub</text>
    <text x="94" y="493" font-size="16" fill="#d7e0ea">PR / Issue / 仓库上下文</text>
  </g>
  <g>
    <rect x="354" y="428" width="262" height="92" rx="14" fill="#0f8b66"/>
    <text x="378" y="463" font-size="24" font-weight="800" fill="#ffffff">数据库</text>
    <text x="378" y="493" font-size="16" fill="#ddfff1">只读查询 / schema / 样例</text>
  </g>
  <g>
    <rect x="638" y="428" width="262" height="92" rx="14" fill="#3e63dd"/>
    <text x="662" y="463" font-size="24" font-weight="800" fill="#ffffff">浏览器</text>
    <text x="662" y="493" font-size="16" fill="#e6ecff">页面信息 / 资料 / 截图</text>
  </g>
  <g>
    <rect x="922" y="428" width="288" height="92" rx="14" fill="#c47b11"/>
    <text x="946" y="463" font-size="24" font-weight="800" fill="#ffffff">Playwright</text>
    <text x="946" y="493" font-size="16" fill="#fff4d8">点击 / 填表 / UI 测试</text>
  </g>

  <rect x="70" y="578" width="1140" height="66" rx="18" fill="#f8fafc" stroke="#d7dee8"/>
  <text x="94" y="606" class="note">排查顺序</text>
  <g>
    <rect x="176" y="594" width="88" height="30" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="193" y="615" class="tag">终端输出</text>
    <rect x="278" y="594" width="88" height="30" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="295" y="615" class="tag">配置文件</text>
    <rect x="380" y="594" width="118" height="30" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="397" y="615" class="tag">Key/API 地址</text>
    <rect x="512" y="594" width="88" height="30" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="529" y="615" class="tag">权益状态</text>
    <rect x="614" y="594" width="76" height="30" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="635" y="615" class="tag">日志页</text>
    <rect x="704" y="594" width="62" height="30" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="721" y="615" class="tag">网络</text>
    <rect x="780" y="594" width="62" height="30" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="797" y="615" class="tag">权限</text>
    <rect x="856" y="594" width="88" height="30" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="873" y="615" class="tag">项目目录</text>
  </g>
</svg>

