<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Claude Code 第一次进入项目和读代码流程">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.55" stop-color="#182331"/>
      <stop offset="1" stop-color="#203322"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10" fill="none" stroke="#a3a3a3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:900;fill:#f8fafc;letter-spacing:0}
      .sub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:700;fill:#cbd5e1;letter-spacing:0}
      .label{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:850;fill:#f8fafc;letter-spacing:0}
      .small{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:700;fill:#cbd5e1;letter-spacing:0}
      .mono{font-family:Menlo,Consolas,"SFMono-Regular",monospace;font-weight:800;fill:#a7f3d0}
      .node{fill:url(#card);stroke:#334155;stroke-width:1.4;filter:url(#shadow)}
      .line{stroke:#a3a3a3;stroke-width:2;fill:none;marker-end:url(#arrow);stroke-linecap:round}
      .plan{fill:#102a24;stroke:#10b981;stroke-width:1.4;filter:url(#shadow)}
      .diff{fill:#182238;stroke:#60a5fa;stroke-width:1.4;filter:url(#shadow)}
      .warn{fill:#331f12;stroke:#f59e0b;stroke-width:1.4;filter:url(#shadow)}
      .pill{fill:#0f172a;stroke:#475569;stroke-width:1}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.22">
    <path d="M0 108H1280M0 216H1280M0 324H1280M0 432H1280M0 540H1280" stroke="#94a3b8" stroke-width="1"/>
    <path d="M120 0V720M260 0V720M400 0V720M540 0V720M680 0V720M820 0V720M960 0V720M1100 0V720" stroke="#94a3b8" stroke-width="1"/>
  </g>
  <text class="title" x="64" y="76" font-size="40">Claude Code 第一次进入项目和读代码</text>
  <text class="sub" x="64" y="112" font-size="20">先计划，再小改动，最后看 diff 和验证</text>
  <g transform="translate(64 166)">
    <rect class="node" x="0" y="0" width="174" height="118" rx="8"/>
    <text class="label" x="22" y="38" font-size="23">选项目目录</text>
    <text class="small" x="22" y="72" font-size="17">确认 pwd</text>
    <text class="small" x="22" y="98" font-size="17">别在 home 启动</text>
  </g>
  <path class="line" d="M248 225H306"/>
  <g transform="translate(316 166)">
    <rect class="node" x="0" y="0" width="190" height="118" rx="8"/>
    <text class="label" x="22" y="38" font-size="23">检查环境</text>
    <text class="mono" x="22" y="72" font-size="17">claude --help</text>
    <text class="mono" x="22" y="98" font-size="17">git status</text>
  </g>
  <path class="line" d="M516 225H574"/>
  <g transform="translate(584 166)">
    <rect class="plan" x="0" y="0" width="228" height="118" rx="8"/>
    <text class="label" x="22" y="38" font-size="23">计划模式</text>
    <text class="mono" x="22" y="72" font-size="17">--permission-mode plan</text>
    <text class="small" x="22" y="98" font-size="17">先读，不改</text>
  </g>
  <path class="line" d="M822 225H880"/>
  <g transform="translate(890 166)">
    <rect class="node" x="0" y="0" width="326" height="118" rx="8"/>
    <text class="label" x="22" y="38" font-size="23">读项目</text>
    <text class="small" x="22" y="72" font-size="17">README · package.json · src</text>
    <text class="small" x="22" y="98" font-size="17">CLAUDE.md / 运行命令</text>
  </g>
  <path class="line" d="M1052 296V354"/>
  <g transform="translate(866 368)">
    <rect class="warn" x="0" y="0" width="350" height="126" rx="8"/>
    <text class="label" x="22" y="38" font-size="23">权限核对</text>
    <text class="mono" x="22" y="72" font-size="17">/permissions  /status</text>
    <text class="small" x="22" y="102" font-size="17">--add-dir 只加必要目录</text>
  </g>
  <path class="line" d="M856 431H794"/>
  <g transform="translate(548 368)">
    <rect class="diff" x="0" y="0" width="236" height="126" rx="8"/>
    <text class="label" x="22" y="38" font-size="23">小改动</text>
    <text class="small" x="22" y="72" font-size="17">确认计划后再改</text>
    <text class="small" x="22" y="102" font-size="17">只碰一个目标点</text>
  </g>
  <path class="line" d="M538 431H476"/>
  <g transform="translate(272 368)">
    <rect class="diff" x="0" y="0" width="194" height="126" rx="8"/>
    <text class="label" x="22" y="38" font-size="23">看 diff</text>
    <text class="mono" x="22" y="74" font-size="17">git diff</text>
    <text class="small" x="22" y="102" font-size="17">确认修改范围</text>
  </g>
  <path class="line" d="M262 431H204"/>
  <g transform="translate(64 368)">
    <rect class="node" x="0" y="0" width="130" height="126" rx="8"/>
    <text class="label" x="20" y="38" font-size="23">验证</text>
    <text class="mono" x="20" y="74" font-size="16">npm test</text>
    <text class="mono" x="20" y="102" font-size="16">build</text>
  </g>
  <g transform="translate(64 590)">
    <rect class="pill" x="0" y="0" width="1152" height="54" rx="8"/>
    <text class="small" x="24" y="35" font-size="18">排查顺序：终端输出 · 配置文件 · Key/API 地址 · 权益状态 · 日志页 · 网络 · 权限 · 项目目录</text>
  </g>
  <g transform="translate(990 64)">
    <rect fill="#0f172a" stroke="#475569" x="0" y="0" width="226" height="54" rx="8"/>
    <text class="mono" x="18" y="34" font-size="18">V027 · MR-10+16</text>
  </g>
</svg>

