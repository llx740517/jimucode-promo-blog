<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V014 Linux server Claude Code install flow">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0c1118"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#13261f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#84a7b7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#6ee7b7" stroke-width="1">
    <path d="M50 140H1230M50 260H1230M50 380H1230M50 500H1230"/>
    <path d="M150 70V620M330 70V620M510 70V620M690 70V620M870 70V620M1050 70V620"/>
  </g>
  <g transform="translate(54 40)">
    <text x="0" y="0" fill="#9fd8c6" font-family="Arial, sans-serif" font-size="18" font-weight="700">V014 / MR-06</text>
    <text x="0" y="48" fill="#f8fafc" font-family="Arial, sans-serif" font-size="42" font-weight="800">Linux 服务器上安装 Claude Code</text>
    <text x="0" y="84" fill="#b7c6d6" font-family="Arial, sans-serif" font-size="22">从 SSH 到第一次提问，先跑通再进入项目</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="60" y="168" width="1160" height="330" rx="20" fill="url(#panel)" stroke="#2e4055" stroke-width="1"/>
    <rect x="88" y="194" width="322" height="278" rx="14" fill="#0b1220" stroke="#203147"/>
    <circle cx="114" cy="220" r="6" fill="#fb7185"/>
    <circle cx="136" cy="220" r="6" fill="#fbbf24"/>
    <circle cx="158" cy="220" r="6" fill="#34d399"/>
    <text x="112" y="260" fill="#7dd3fc" font-family="Menlo, Consolas, monospace" font-size="18">$ ssh dev@***.***.***.***</text>
    <text x="112" y="294" fill="#d1fae5" font-family="Menlo, Consolas, monospace" font-size="18">$ whoami  # dev</text>
    <text x="112" y="328" fill="#d1fae5" font-family="Menlo, Consolas, monospace" font-size="18">$ node --version</text>
    <text x="112" y="362" fill="#d1fae5" font-family="Menlo, Consolas, monospace" font-size="18">$ curl -fsSL ... | bash</text>
    <text x="112" y="396" fill="#d1fae5" font-family="Menlo, Consolas, monospace" font-size="18">$ claude doctor</text>
  </g>
  <g font-family="Arial, sans-serif">
    <g transform="translate(454 202)">
      <rect width="140" height="76" rx="12" fill="#163447" stroke="#4fb3c8"/>
      <text x="70" y="31" text-anchor="middle" fill="#e6fffb" font-size="18" font-weight="700">ECS / SSH</text>
      <text x="70" y="55" text-anchor="middle" fill="#bde8f1" font-size="14">先能连上</text>
    </g>
    <g transform="translate(654 202)">
      <rect width="150" height="76" rx="12" fill="#1f3642" stroke="#7dd3fc"/>
      <text x="75" y="31" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">普通用户</text>
      <text x="75" y="55" text-anchor="middle" fill="#bfdbfe" font-size="14">权限别跳过</text>
    </g>
    <g transform="translate(864 202)">
      <rect width="150" height="76" rx="12" fill="#1f3f36" stroke="#6ee7b7"/>
      <text x="75" y="31" text-anchor="middle" fill="#f0fdf4" font-size="18" font-weight="700">Git / Node / curl</text>
      <text x="75" y="55" text-anchor="middle" fill="#bbf7d0" font-size="14">环境先确认</text>
    </g>
    <g transform="translate(520 336)">
      <rect width="174" height="76" rx="12" fill="#263340" stroke="#f59e0b"/>
      <text x="87" y="31" text-anchor="middle" fill="#fff7ed" font-size="18" font-weight="700">安装 Claude Code</text>
      <text x="87" y="55" text-anchor="middle" fill="#fed7aa" font-size="14">官方脚本安装</text>
    </g>
    <g transform="translate(754 336)">
      <rect width="164" height="76" rx="12" fill="#283142" stroke="#a78bfa"/>
      <text x="82" y="31" text-anchor="middle" fill="#faf5ff" font-size="18" font-weight="700">认证与配置</text>
      <text x="82" y="55" text-anchor="middle" fill="#ddd6fe" font-size="14">账号 / Key 分开看</text>
    </g>
    <g transform="translate(978 336)">
      <rect width="150" height="76" rx="12" fill="#173b32" stroke="#34d399"/>
      <text x="75" y="31" text-anchor="middle" fill="#ecfdf5" font-size="18" font-weight="700">第一次提问</text>
      <text x="75" y="55" text-anchor="middle" fill="#bbf7d0" font-size="14">先只读目录</text>
    </g>
    <g transform="translate(754 454)">
      <rect width="164" height="54" rx="12" fill="#152235" stroke="#60a5fa"/>
      <text x="82" y="35" text-anchor="middle" fill="#dbeafe" font-size="17" font-weight="700">日志 / 状态核对</text>
    </g>
  </g>
  <g fill="none" stroke="#84a7b7" stroke-width="2" marker-end="url(#arrow)" opacity="0.88">
    <path d="M594 240H654"/>
    <path d="M804 240H864"/>
    <path d="M939 278C922 314 741 304 688 336"/>
    <path d="M694 374H754"/>
    <path d="M918 374H978"/>
    <path d="M1053 412C1034 468 946 482 918 482"/>
  </g>
  <g transform="translate(60 548)" font-family="Arial, sans-serif">
    <text x="0" y="0" fill="#e2e8f0" font-size="20" font-weight="800">排查顺序</text>
    <g transform="translate(0 24)" fill="#d9f99d" font-size="15" font-weight="700">
      <rect x="0" y="0" width="104" height="34" rx="17" fill="#1f2937" stroke="#4b5563"/>
      <text x="52" y="22" text-anchor="middle">终端输出</text>
      <rect x="118" y="0" width="104" height="34" rx="17" fill="#1f2937" stroke="#4b5563"/>
      <text x="170" y="22" text-anchor="middle">配置文件</text>
      <rect x="236" y="0" width="126" height="34" rx="17" fill="#1f2937" stroke="#4b5563"/>
      <text x="299" y="22" text-anchor="middle">Key/API 地址</text>
      <rect x="376" y="0" width="104" height="34" rx="17" fill="#1f2937" stroke="#4b5563"/>
      <text x="428" y="22" text-anchor="middle">权益状态</text>
      <rect x="494" y="0" width="84" height="34" rx="17" fill="#1f2937" stroke="#4b5563"/>
      <text x="536" y="22" text-anchor="middle">日志页</text>
      <rect x="592" y="0" width="70" height="34" rx="17" fill="#1f2937" stroke="#4b5563"/>
      <text x="627" y="22" text-anchor="middle">网络</text>
      <rect x="676" y="0" width="70" height="34" rx="17" fill="#1f2937" stroke="#4b5563"/>
      <text x="711" y="22" text-anchor="middle">权限</text>
      <rect x="760" y="0" width="104" height="34" rx="17" fill="#1f2937" stroke="#4b5563"/>
      <text x="812" y="22" text-anchor="middle">项目目录</text>
    </g>
  </g>
</svg>
