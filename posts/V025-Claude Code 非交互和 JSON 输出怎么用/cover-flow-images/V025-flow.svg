<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V025 Claude Code 非交互任务闭环流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#182235"/>
      <stop offset="1" stop-color="#232019"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="json" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123c33"/>
      <stop offset="1" stop-color="#0f2a24"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9.5" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 38px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #cbd5e1; }
      .nodeTitle { font: 700 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #f8fafc; }
      .nodeText { font: 500 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #cbd5e1; }
      .code { font: 600 18px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #d1fae5; }
      .smallCode { font: 600 14px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #bfdbfe; }
      .chip { font: 600 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #e5e7eb; }
      .tiny { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #a7b4c5; }
      .arrow { stroke: #9ca3af; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M88 114 C205 28 334 68 437 108 C571 160 654 134 771 84 C918 21 1053 58 1167 155" fill="none" stroke="#2dd4bf" stroke-opacity="0.12" stroke-width="2"/>
  <path d="M104 608 C242 548 365 574 477 618 C608 670 724 662 846 606 C966 551 1088 555 1190 604" fill="none" stroke="#f97316" stroke-opacity="0.14" stroke-width="2"/>

  <text x="72" y="72" class="title">Claude Code 非交互任务闭环</text>
  <text x="74" y="105" class="subtitle">输入文件 → claude -p → 输出格式 → JSON 文件 → 校验 → 脚本 / 报告</text>

  <g filter="url(#softShadow)">
    <rect x="72" y="170" width="198" height="150" rx="14" fill="#1f2937" stroke="#3b82f6" stroke-opacity="0.55"/>
    <text x="96" y="214" class="nodeTitle">1 输入文件</text>
    <text x="96" y="250" class="smallCode">input/bug-notes.md</text>
    <text x="96" y="278" class="smallCode">input/requirements.md</text>
    <text x="96" y="304" class="nodeText">脱敏素材</text>
  </g>

  <line x1="270" y1="245" x2="357" y2="245" class="arrow"/>

  <g filter="url(#softShadow)">
    <rect x="360" y="156" width="244" height="178" rx="16" fill="url(#terminal)" stroke="#64748b" stroke-opacity="0.55"/>
    <circle cx="385" cy="181" r="6" fill="#ef4444"/>
    <circle cx="406" cy="181" r="6" fill="#f59e0b"/>
    <circle cx="427" cy="181" r="6" fill="#22c55e"/>
    <text x="388" y="226" class="code">claude -p</text>
    <text x="388" y="264" class="nodeText">跑完即退出</text>
    <text x="388" y="294" class="nodeText">只在可信目录使用</text>
  </g>

  <line x1="604" y1="245" x2="682" y2="245" class="arrow"/>

  <g filter="url(#softShadow)">
    <rect x="686" y="138" width="236" height="214" rx="16" fill="#222a38" stroke="#14b8a6" stroke-opacity="0.5"/>
    <text x="712" y="180" class="nodeTitle">2 输出格式</text>
    <rect x="712" y="206" width="62" height="32" rx="16" fill="#334155"/>
    <text x="734" y="227" text-anchor="middle" class="chip">text</text>
    <rect x="790" y="206" width="64" height="32" rx="16" fill="#14532d"/>
    <text x="822" y="227" text-anchor="middle" class="chip">json</text>
    <rect x="712" y="252" width="126" height="32" rx="16" fill="#7c2d12"/>
    <text x="775" y="273" text-anchor="middle" class="chip">stream-json</text>
    <text x="712" y="318" class="nodeText">给人看 / 给脚本接 / 看过程</text>
  </g>

  <line x1="922" y1="245" x2="1002" y2="245" class="arrow"/>

  <g filter="url(#softShadow)">
    <rect x="1006" y="156" width="202" height="178" rx="16" fill="url(#json)" stroke="#22c55e" stroke-opacity="0.55"/>
    <text x="1030" y="200" class="nodeTitle">3 输出文件</text>
    <text x="1030" y="240" class="smallCode">output/review.json</text>
    <text x="1030" y="272" class="nodeText">可交给脚本</text>
    <text x="1030" y="300" class="nodeText">也可做报告素材</text>
  </g>

  <line x1="1107" y1="334" x2="1107" y2="404" class="arrow"/>

  <g filter="url(#softShadow)">
    <rect x="860" y="408" width="348" height="116" rx="16" fill="#1b2735" stroke="#f59e0b" stroke-opacity="0.48"/>
    <text x="884" y="450" class="nodeTitle">4 校验 / 接入</text>
    <text x="884" y="486" class="smallCode">jq . output/review.json</text>
    <text x="884" y="512" class="nodeText">失败时先看字段和解析错误</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="72" y="390" width="620" height="134" rx="16" fill="#1e293b" stroke="#ef4444" stroke-opacity="0.42"/>
    <text x="98" y="432" class="nodeTitle">录屏提醒</text>
    <text x="98" y="468" class="nodeText">JSON 输出不等于业务结构永远正确，仍要校验。</text>
    <text x="98" y="500" class="nodeText">Key、账号、日志、用量、真实路径全部隐藏。</text>
  </g>

  <line x1="604" y1="320" x2="692" y2="418" class="arrow"/>
  <line x1="692" y1="468" x2="854" y2="468" class="arrow"/>

  <g>
    <rect x="72" y="592" width="1136" height="62" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="96" y="628" class="tiny">失败排查顺序：</text>
    <g transform="translate(196 606)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">终端输出</text>
    </g>
    <g transform="translate(286 606)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">输入文件</text>
    </g>
    <g transform="translate(376 606)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">配置文件</text>
    </g>
    <g transform="translate(466 606)">
      <rect width="116" height="30" rx="15" fill="#273449"/><text x="58" y="20" text-anchor="middle" class="chip">Key/API 地址</text>
    </g>
    <g transform="translate(594 606)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">权益状态</text>
    </g>
    <g transform="translate(684 606)">
      <rect width="64" height="30" rx="15" fill="#273449"/><text x="32" y="20" text-anchor="middle" class="chip">日志页</text>
    </g>
    <g transform="translate(760 606)">
      <rect width="50" height="30" rx="15" fill="#273449"/><text x="25" y="20" text-anchor="middle" class="chip">网络</text>
    </g>
    <g transform="translate(822 606)">
      <rect width="50" height="30" rx="15" fill="#273449"/><text x="25" y="20" text-anchor="middle" class="chip">权限</text>
    </g>
    <g transform="translate(884 606)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">项目目录</text>
    </g>
  </g>

  <text x="72" y="682" class="tiny">V025</text>
</svg>

