<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V021 Codex 非交互和结构化输出流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f8fb"/>
      <stop offset="1" stop-color="#edf3f7"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#16313c" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,1.2 L8,4.5 L0,7.8" fill="none" stroke="#52707d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="44" y="44" width="1192" height="632" rx="26" fill="#ffffff" opacity="0.74"/>
  <text x="72" y="98" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="800" fill="#18323b">Codex 非交互和结构化输出流程</text>
  <text x="72" y="132" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#5a7079">输入文件到输出文件，先小范围试跑，再接脚本或 CI</text>

  <g font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(66 205)">
      <rect width="155" height="138" rx="18" fill="#ffffff" stroke="#c9d8df" stroke-width="1.2"/>
      <rect x="18" y="18" width="46" height="54" rx="8" fill="#dff0ff" stroke="#8ebbd7"/>
      <path d="M52 18 L64 30 L52 30 Z" fill="#b7dcf3"/>
      <text x="18" y="96" font-size="22" font-weight="800" fill="#19333d">输入文件</text>
      <text x="18" y="122" font-size="15" fill="#5b737c">input/task.md</text>
    </g>

    <g transform="translate(274 205)">
      <rect width="155" height="138" rx="18" fill="#ffffff" stroke="#bfd5c9" stroke-width="1.2"/>
      <rect x="18" y="20" width="118" height="52" rx="10" fill="#15323b"/>
      <circle cx="35" cy="36" r="4" fill="#ff665c"/>
      <circle cx="49" cy="36" r="4" fill="#f2c14e"/>
      <circle cx="63" cy="36" r="4" fill="#4bbf73"/>
      <text x="29" y="59" font-size="16" fill="#d7f8e8" font-family="Menlo, Consolas, monospace">$ exec</text>
      <text x="18" y="96" font-size="22" font-weight="800" fill="#19333d">codex exec</text>
      <text x="18" y="122" font-size="15" fill="#5b737c">非交互运行</text>
    </g>

    <g transform="translate(482 205)">
      <rect width="188" height="138" rx="18" fill="#ffffff" stroke="#d7cfef" stroke-width="1.2"/>
      <rect x="18" y="18" width="152" height="28" rx="14" fill="#ebe7ff"/>
      <rect x="18" y="54" width="122" height="28" rx="14" fill="#e6f2ff"/>
      <rect x="18" y="90" width="146" height="28" rx="14" fill="#e9f7ee"/>
      <text x="31" y="38" font-size="15" fill="#564d83" font-family="Menlo, Consolas, monospace">-o file</text>
      <text x="31" y="74" font-size="15" fill="#2d5b80" font-family="Menlo, Consolas, monospace">--json</text>
      <text x="31" y="110" font-size="15" fill="#2f7250" font-family="Menlo, Consolas, monospace">--schema</text>
    </g>

    <g transform="translate(723 205)">
      <rect width="180" height="138" rx="18" fill="#ffffff" stroke="#d7dcc8" stroke-width="1.2"/>
      <rect x="18" y="20" width="52" height="68" rx="9" fill="#fff4cf" stroke="#e2c265"/>
      <rect x="79" y="20" width="52" height="68" rx="9" fill="#e5f1ff" stroke="#91b7d8"/>
      <rect x="110" y="48" width="52" height="68" rx="9" fill="#e7f7ed" stroke="#8ccba4"/>
      <text x="18" y="112" font-size="22" font-weight="800" fill="#19333d">输出文件</text>
      <text x="18" y="132" font-size="14" fill="#5b737c">md / jsonl / json</text>
    </g>

    <g transform="translate(956 205)">
      <rect width="155" height="138" rx="18" fill="#ffffff" stroke="#efc5c1" stroke-width="1.2"/>
      <rect x="18" y="20" width="118" height="70" rx="12" fill="#fff0ef"/>
      <path d="M39 57 L58 76 L101 32" fill="none" stroke="#cf4d44" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="18" y="112" font-size="22" font-weight="800" fill="#19333d">检查结果</text>
      <text x="18" y="132" font-size="14" fill="#5b737c">错误 / 字段 / 内容</text>
    </g>
  </g>

  <g stroke="#52707d" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.85">
    <path d="M231 274 H264"/>
    <path d="M439 274 H472"/>
    <path d="M681 274 H713"/>
    <path d="M914 274 H946"/>
  </g>

  <g transform="translate(308 419)" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <rect x="0" y="0" width="664" height="82" rx="18" fill="#17333c"/>
    <text x="28" y="34" font-size="22" font-weight="800" fill="#ffffff">接入脚本或 CI 前的原则</text>
    <text x="28" y="63" font-size="17" fill="#b9d4dd">先用脱敏输入小范围试跑，再保存日志，最后人工复核关键输出</text>
  </g>
  <path d="M1033 352 C1033 402 960 431 972 461" stroke="#52707d" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.85"/>

  <g transform="translate(72 594)" font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="0" y="0" font-size="16" font-weight="700" fill="#47636d">排查标签</text>
    <g transform="translate(0 18)" font-size="15" fill="#34505a">
      <rect x="0" y="0" width="124" height="34" rx="17" fill="#e8f0f4"/>
      <text x="16" y="22">input/task.md</text>
      <rect x="136" y="0" width="116" height="34" rx="17" fill="#e8f0f4"/>
      <text x="152" y="22">codex exec</text>
      <rect x="264" y="0" width="82" height="34" rx="17" fill="#e8f0f4"/>
      <text x="280" y="22">--json</text>
      <rect x="358" y="0" width="176" height="34" rx="17" fill="#e8f0f4"/>
      <text x="374" y="22">--output-last-message</text>
      <rect x="546" y="0" width="150" height="34" rx="17" fill="#e8f0f4"/>
      <text x="562" y="22">--output-schema</text>
      <rect x="708" y="0" width="82" height="34" rx="17" fill="#e8f0f4"/>
      <text x="724" y="22">output/</text>
      <rect x="802" y="0" width="74" height="34" rx="17" fill="#e8f0f4"/>
      <text x="818" y="22">JSONL</text>
      <rect x="888" y="0" width="54" height="34" rx="17" fill="#e8f0f4"/>
      <text x="904" y="22">CI</text>
      <rect x="954" y="0" width="62" height="34" rx="17" fill="#e8f0f4"/>
      <text x="970" y="22">日志</text>
      <rect x="1028" y="0" width="72" height="34" rx="17" fill="#e8f0f4"/>
      <text x="1044" y="22">token</text>
    </g>
  </g>
</svg>

