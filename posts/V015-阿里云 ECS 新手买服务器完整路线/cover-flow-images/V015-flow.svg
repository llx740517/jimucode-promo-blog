<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V015 阿里云 ECS 新手购买路线流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.55" stop-color="#13233A"/>
      <stop offset="1" stop-color="#102A2A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF2F8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#9CC3D5" stroke-width="1.5"/>
    </marker>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:44px;font-weight:800;fill:#F8FAFC;letter-spacing:0}
      .subtitle{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:20px;font-weight:500;fill:#CFE5EF;letter-spacing:0}
      .num{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:18px;font-weight:800;fill:#FFFFFF;letter-spacing:0}
      .step{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:25px;font-weight:800;fill:#102133;letter-spacing:0}
      .desc{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:17px;font-weight:600;fill:#4B6478;letter-spacing:0}
      .tag{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:18px;font-weight:700;fill:#E6F4F1;letter-spacing:0}
      .small{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:16px;font-weight:600;fill:#9FB8C8;letter-spacing:0}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.16">
    <path d="M0 104H1280M0 208H1280M0 312H1280M0 416H1280M0 520H1280M0 624H1280" stroke="#D6E6EF" stroke-width="1"/>
    <path d="M120 0V720M240 0V720M360 0V720M480 0V720M600 0V720M720 0V720M840 0V720M960 0V720M1080 0V720M1200 0V720" stroke="#D6E6EF" stroke-width="1"/>
  </g>
  <rect x="56" y="42" width="1168" height="88" rx="8" fill="#122C44" stroke="#254B62"/>
  <text x="84" y="92" class="title">阿里云 ECS 新手购买路线</text>
  <text x="765" y="91" class="subtitle">规格、镜像、安全组先看清</text>

  <g transform="translate(68 190)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="164" height="128" rx="8" fill="url(#card)" stroke="#BBD2DE"/>
      <circle cx="28" cy="30" r="16" fill="#0EA5A3"/><text x="22" y="37" class="num">1</text>
      <text x="22" y="74" class="step">进入购买页</text>
      <text x="22" y="104" class="desc">ECS 控制台</text>
    </g>
    <path d="M174 64H216" stroke="#9CC3D5" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(226 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="164" height="128" rx="8" fill="url(#card)" stroke="#BBD2DE"/>
      <circle cx="28" cy="30" r="16" fill="#2563EB"/><text x="22" y="37" class="num">2</text>
      <text x="22" y="74" class="step">选购买方式</text>
      <text x="22" y="104" class="desc">快速 / 自定义</text>
    </g>
    <path d="M400 64H442" stroke="#9CC3D5" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(452 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="182" height="128" rx="8" fill="url(#card)" stroke="#BBD2DE"/>
      <circle cx="28" cy="30" r="16" fill="#F59E0B"/><text x="22" y="37" class="num">3</text>
      <text x="22" y="74" class="step">配基础配置</text>
      <text x="22" y="104" class="desc">地域 / 规格 / 镜像</text>
    </g>
    <path d="M644 64H686" stroke="#9CC3D5" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(696 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="190" height="128" rx="8" fill="url(#card)" stroke="#BBD2DE"/>
      <circle cx="28" cy="30" r="16" fill="#DC2626"/><text x="22" y="37" class="num">4</text>
      <text x="22" y="74" class="step">网络与安全</text>
      <text x="22" y="104" class="desc">公网 / 带宽 / 安全组</text>
    </g>
    <path d="M896 64H938" stroke="#9CC3D5" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(948 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="164" height="128" rx="8" fill="url(#card)" stroke="#BBD2DE"/>
      <circle cx="28" cy="30" r="16" fill="#7C3AED"/><text x="22" y="37" class="num">5</text>
      <text x="22" y="74" class="step">核对订单</text>
      <text x="22" y="104" class="desc">摘要 / 预算 / 隐藏</text>
    </g>
  </g>

  <g transform="translate(463 392)" filter="url(#shadow)">
    <rect x="0" y="0" width="354" height="96" rx="8" fill="#E8FFF9" stroke="#76C7B7"/>
    <circle cx="34" cy="48" r="18" fill="#059669"/><text x="28" y="55" class="num">6</text>
    <text x="70" y="42" class="step">实例运行中</text>
    <text x="70" y="72" class="desc">回控制台确认 Running / 运行中</text>
  </g>
  <path d="M625 318V384" stroke="#9CC3D5" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(88 572)">
    <rect x="0" y="0" width="1104" height="78" rx="8" fill="#0B2235" stroke="#274B61"/>
    <text x="24" y="33" class="tag">购买前必查：</text>
    <text x="142" y="33" class="tag">地域</text>
    <text x="218" y="33" class="tag">规格</text>
    <text x="294" y="33" class="tag">镜像</text>
    <text x="370" y="33" class="tag">公网 IP</text>
    <text x="476" y="33" class="tag">安全组</text>
    <text x="570" y="33" class="tag">登录凭证</text>
    <text x="688" y="33" class="tag">配置摘要</text>
    <text x="24" y="62" class="small">必须隐藏：订单 / 实例 ID / 公网 IP / 安全组 ID / 密钥文件 / 账号信息</text>
  </g>
</svg>
