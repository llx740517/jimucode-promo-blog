<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V020 Codex CLI 基础命令路线">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B2A2D"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EAF2F8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#9CC3D5" stroke-width="1.5"/>
    </marker>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:46px;font-weight:850;fill:#F8FAFC;letter-spacing:0}
      .subtitle{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:21px;font-weight:650;fill:#BBD6E5;letter-spacing:0}
      .num{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:18px;font-weight:850;fill:#FFFFFF;letter-spacing:0}
      .step{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:24px;font-weight:850;fill:#111827;letter-spacing:0}
      .cmd{font-family:Menlo,Consolas,"SFMono-Regular",monospace;font-size:15px;font-weight:700;fill:#0F766E;letter-spacing:0}
      .tag{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:18px;font-weight:750;fill:#E6F4F1;letter-spacing:0}
      .small{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:16px;font-weight:650;fill:#9FB8C8;letter-spacing:0}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.14">
    <path d="M0 90H1280M0 180H1280M0 270H1280M0 360H1280M0 450H1280M0 540H1280M0 630H1280" stroke="#D6E6EF"/>
    <path d="M90 0V720M180 0V720M270 0V720M360 0V720M450 0V720M540 0V720M630 0V720M720 0V720M810 0V720M900 0V720M990 0V720M1080 0V720M1170 0V720" stroke="#D6E6EF"/>
  </g>
  <rect x="56" y="42" width="1168" height="92" rx="8" fill="#111D2D" stroke="#28475B"/>
  <text x="84" y="96" class="title">Codex CLI 基础命令路线</text>
  <text x="740" y="94" class="subtitle">help -> login -> doctor -> update</text>

  <g transform="translate(72 188)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="176" height="132" rx="8" fill="url(#card)" stroke="#BCD3DF"/>
      <circle cx="30" cy="30" r="16" fill="#0EA5A3"/><text x="24" y="37" class="num">1</text>
      <text x="22" y="72" class="step">检查版本</text>
      <text x="22" y="103" class="cmd">codex --version</text>
    </g>
    <path d="M186 66H226" stroke="#9CC3D5" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(236 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="176" height="132" rx="8" fill="url(#card)" stroke="#BCD3DF"/>
      <circle cx="30" cy="30" r="16" fill="#2563EB"/><text x="24" y="37" class="num">2</text>
      <text x="22" y="72" class="step">看帮助入口</text>
      <text x="22" y="103" class="cmd">codex --help</text>
    </g>
    <path d="M422 66H462" stroke="#9CC3D5" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(472 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="176" height="132" rx="8" fill="url(#card)" stroke="#BCD3DF"/>
      <circle cx="30" cy="30" r="16" fill="#F59E0B"/><text x="24" y="37" class="num">3</text>
      <text x="22" y="72" class="step">确认登录</text>
      <text x="22" y="103" class="cmd">codex login status</text>
    </g>
    <path d="M658 66H698" stroke="#9CC3D5" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(708 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="190" height="132" rx="8" fill="url(#card)" stroke="#BCD3DF"/>
      <circle cx="30" cy="30" r="16" fill="#DC2626"/><text x="24" y="37" class="num">4</text>
      <text x="22" y="72" class="step">本地诊断</text>
      <text x="22" y="103" class="cmd">codex doctor --summary</text>
    </g>
    <path d="M908 66H948" stroke="#9CC3D5" stroke-width="2" marker-end="url(#arrow)"/>
    <g transform="translate(958 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="176" height="132" rx="8" fill="url(#card)" stroke="#BCD3DF"/>
      <circle cx="30" cy="30" r="16" fill="#7C3AED"/><text x="24" y="37" class="num">5</text>
      <text x="22" y="72" class="step">更新确认</text>
      <text x="22" y="103" class="cmd">codex update --help</text>
    </g>
  </g>

  <g transform="translate(387 398)" filter="url(#shadow)">
    <rect x="0" y="0" width="506" height="104" rx="8" fill="#E9FFF8" stroke="#72C7B9"/>
    <circle cx="38" cy="52" r="18" fill="#059669"/><text x="32" y="59" class="num">6</text>
    <text x="76" y="45" class="step">后续入口</text>
    <text x="76" y="76" class="cmd">resume / fork / app / cloud / --model / --search / --image</text>
  </g>
  <path d="M640 320V390" stroke="#9CC3D5" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(84 572)">
    <rect x="0" y="0" width="1112" height="78" rx="8" fill="#0B2235" stroke="#274B61"/>
    <text x="24" y="33" class="tag">录屏顺序：</text>
    <text x="126" y="33" class="tag">版本</text>
    <text x="194" y="33" class="tag">帮助</text>
    <text x="262" y="33" class="tag">登录</text>
    <text x="330" y="33" class="tag">诊断</text>
    <text x="398" y="33" class="tag">更新</text>
    <text x="466" y="33" class="tag">后续命令入口</text>
    <text x="24" y="62" class="small">必须隐藏：Key / Token / 账号 / 本机路径 / 会话 ID / 云任务 ID</text>
  </g>
</svg>
