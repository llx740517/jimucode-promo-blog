<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V023 Codex 第一次读项目流程图">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0f2f2c"/>
    </linearGradient>
    <linearGradient id="nodeA" x1="0" x2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#21313b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#a7f3d0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .title { fill:#f8fafc; font-size:46px; font-weight:800; letter-spacing:0; }
      .sub { fill:#cbd5e1; font-size:22px; font-weight:500; }
      .nodeTitle { fill:#ffffff; font-size:25px; font-weight:760; letter-spacing:0; }
      .nodeSub { fill:#cbd5e1; font-size:16px; font-weight:500; }
      .tag { fill:#dbeafe; font-size:16px; font-weight:650; }
      .footer { fill:#94a3b8; font-size:18px; font-weight:600; }
      .small { fill:#99f6e4; font-size:15px; font-weight:700; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="42" y="40" width="1196" height="640" rx="28" fill="#0b1220" opacity="0.46" stroke="#334155"/>

  <text x="80" y="105" class="title">Codex 第一次读项目流程</text>
  <text x="82" y="144" class="sub">先确认目录和 Git，再让 AI 小步修改，最后看 diff 和验证结果。</text>
  <rect x="1000" y="78" width="168" height="42" rx="21" fill="#0f766e" opacity="0.95"/>

  <g filter="url(#shadow)">
    <rect x="92" y="222" width="142" height="112" rx="16" fill="url(#nodeA)" stroke="#475569"/>
    <text x="122" y="270" class="nodeTitle">选目录</text>
    <text x="119" y="302" class="nodeSub">--cd 主工作区</text>

    <rect x="266" y="222" width="142" height="112" rx="16" fill="url(#nodeA)" stroke="#475569"/>
    <text x="296" y="270" class="nodeTitle">看 Git</text>
    <text x="294" y="302" class="nodeSub">确认基线干净</text>

    <rect x="440" y="222" width="154" height="112" rx="16" fill="#173044" stroke="#38bdf8"/>
    <text x="478" y="270" class="nodeTitle">只读项目</text>
    <text x="468" y="302" class="nodeSub">先说明结构风险</text>

    <rect x="626" y="222" width="142" height="112" rx="16" fill="#293042" stroke="#a78bfa"/>
    <text x="656" y="270" class="nodeTitle">提小任务</text>
    <text x="650" y="302" class="nodeSub">先计划再修改</text>

    <rect x="800" y="222" width="142" height="112" rx="16" fill="#2a3440" stroke="#fbbf24"/>
    <text x="834" y="270" class="nodeTitle">看 diff</text>
    <text x="827" y="302" class="nodeSub">核对改动范围</text>

    <rect x="974" y="222" width="142" height="112" rx="16" fill="#20352f" stroke="#34d399"/>
    <text x="1007" y="270" class="nodeTitle">跑验证</text>
    <text x="1000" y="302" class="nodeSub">test / build</text>
  </g>

  <g fill="none" stroke="#a7f3d0" stroke-width="2" marker-end="url(#arrow)" opacity="0.95">
    <path d="M238 278 H262"/>
    <path d="M412 278 H436"/>
    <path d="M598 278 H622"/>
    <path d="M772 278 H796"/>
    <path d="M946 278 H970"/>
  </g>

  <path d="M1045 338 C1045 420 695 414 695 494" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="7 9" marker-end="url(#arrow)"/>
  <rect x="554" y="474" width="282" height="96" rx="18" fill="#12202b" stroke="#14b8a6"/>
  <text x="613" y="514" class="nodeTitle">说清边界</text>
  <text x="590" y="546" class="nodeSub">通过不等于所有问题解决</text>

  <rect x="92" y="406" width="342" height="164" rx="18" fill="#111827" stroke="#334155"/>
  <text x="122" y="448" class="small">第一次提示词</text>
  <text x="122" y="486" class="nodeSub">先只读取项目结构，说明入口文件、</text>
  <text x="122" y="516" class="nodeSub">运行命令和风险，不要修改文件。</text>

  <rect x="872" y="406" width="304" height="164" rx="18" fill="#111827" stroke="#334155"/>
  <text x="902" y="448" class="small">验收三件事</text>
  <text x="902" y="486" class="nodeSub">1. 文件数量是否合理</text>
  <text x="902" y="516" class="nodeSub">2. diff 是否围绕任务</text>
  <text x="902" y="546" class="nodeSub">3. 测试或构建是否跑过</text>

  <line x1="80" y1="615" x2="1200" y2="615" stroke="#334155"/>
  <text x="85" y="650" class="footer">排查顺序：终端输出 / 配置文件 / Key/API 地址 / 权益状态 / 日志页 / 网络 / 权限 / 项目目录</text>
</svg>

