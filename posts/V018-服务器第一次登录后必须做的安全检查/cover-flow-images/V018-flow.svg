<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07110f"/>
      <stop offset="0.52" stop-color="#10231f"/>
      <stop offset="1" stop-color="#20251b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L8 5 L1 9" fill="none" stroke="#8ddbc8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:900;font-size:42px;fill:#f3fff9;letter-spacing:0}
      .sub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:19px;fill:#a8c7bd;letter-spacing:0}
      .nodeTitle{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:800;font-size:23px;fill:#f4fff9;letter-spacing:0}
      .nodeSub{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:15px;fill:#b7cfc6;letter-spacing:0}
      .num{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:900;font-size:18px;fill:#07110f;letter-spacing:0}
      .tag{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:700;font-size:15px;fill:#d6fff1;letter-spacing:0}
      .small{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:14px;fill:#89aa9f;letter-spacing:0}
      .line{fill:none;stroke:#8ddbc8;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 90H1280M0 180H1280M0 270H1280M0 360H1280M0 450H1280M0 540H1280M0 630H1280M100 0V720M200 0V720M300 0V720M400 0V720M500 0V720M600 0V720M700 0V720M800 0V720M900 0V720M1000 0V720M1100 0V720M1200 0V720" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
  <path d="M70 132 C252 72 390 160 566 112 C754 60 896 130 1210 74" fill="none" stroke="#47d7b8" stroke-opacity="0.22" stroke-width="2"/>
  <text x="64" y="76" class="title">服务器首次登录安全检查</text>
  <text x="66" y="112" class="sub">安全组 → SSH → 用户权限 → 端口/防火墙 → 资源/PATH → Git → 快照</text>
  <text x="1202" y="82" class="small" text-anchor="end">V018 / 服务器安全</text>

  <g transform="translate(64 164)" filter="url(#shadow)">
    <rect width="166" height="118" rx="10" fill="#132823" stroke="#31584d"/>
    <circle cx="30" cy="30" r="16" fill="#5ee3be"/><text x="24" y="36" class="num">1</text>
    <text x="24" y="70" class="nodeTitle">ECS/安全组</text><text x="24" y="98" class="nodeSub">22 端口来源</text>
  </g>
  <path class="line" d="M238 224 H305"/>
  <g transform="translate(312 164)" filter="url(#shadow)">
    <rect width="142" height="118" rx="10" fill="#102a31" stroke="#2f6574"/>
    <circle cx="30" cy="30" r="16" fill="#67e8f9"/><text x="24" y="36" class="num">2</text>
    <text x="24" y="70" class="nodeTitle">SSH 登录</text><text x="24" y="98" class="nodeSub">密钥隐藏</text>
  </g>
  <path class="line" d="M462 224 H536"/>
  <g transform="translate(542 164)" filter="url(#shadow)">
    <rect width="158" height="118" rx="10" fill="#152a1f" stroke="#3b6751"/>
    <circle cx="30" cy="30" r="16" fill="#a7f3d0"/><text x="24" y="36" class="num">3</text>
    <text x="24" y="70" class="nodeTitle">用户权限</text><text x="24" y="98" class="nodeSub">root / 普通</text>
  </g>
  <path class="line" d="M708 224 H782"/>
  <g transform="translate(788 164)" filter="url(#shadow)">
    <rect width="154" height="118" rx="10" fill="#282415" stroke="#6d6233"/>
    <circle cx="30" cy="30" r="16" fill="#facc15"/><text x="24" y="36" class="num">4</text>
    <text x="24" y="70" class="nodeTitle">系统更新</text><text x="24" y="98" class="nodeSub">先看发行版</text>
  </g>
  <path class="line" d="M950 224 H1024"/>
  <g transform="translate(1030 164)" filter="url(#shadow)">
    <rect width="188" height="118" rx="10" fill="#351b1b" stroke="#7d3d3d"/>
    <circle cx="30" cy="30" r="16" fill="#fb7185"/><text x="24" y="36" class="num">5</text>
    <text x="24" y="70" class="nodeTitle">端口/防火墙</text><text x="24" y="98" class="nodeSub">ss / ufw / firewalld</text>
  </g>

  <path class="line" d="M1128 290 C1120 352 1030 370 975 384"/>
  <g transform="translate(800 370)" filter="url(#shadow)">
    <rect width="176" height="124" rx="10" fill="#1c2634" stroke="#426078"/>
    <circle cx="32" cy="32" r="16" fill="#93c5fd"/><text x="26" y="38" class="num">6</text>
    <text x="26" y="74" class="nodeTitle">资源/PATH</text><text x="26" y="103" class="nodeSub">磁盘 / 内存</text>
  </g>
  <path class="line" d="M792 432 H708"/>
  <g transform="translate(538 370)" filter="url(#shadow)">
    <rect width="170" height="124" rx="10" fill="#20202d" stroke="#5a5872"/>
    <circle cx="32" cy="32" r="16" fill="#c4b5fd"/><text x="26" y="38" class="num">7</text>
    <text x="26" y="74" class="nodeTitle">Git 状态</text><text x="26" y="103" class="nodeSub">改动前确认</text>
  </g>
  <path class="line" d="M530 432 H442"/>
  <g transform="translate(260 370)" filter="url(#shadow)">
    <rect width="182" height="124" rx="10" fill="#102f2a" stroke="#2f7868"/>
    <circle cx="32" cy="32" r="16" fill="#5eead4"/><text x="26" y="38" class="num">8</text>
    <text x="26" y="74" class="nodeTitle">快照/备份</text><text x="26" y="103" class="nodeSub">系统层回退</text>
  </g>

  <g transform="translate(70 570)">
    <rect width="1140" height="80" rx="10" fill="#111b19" stroke="#2b403b"/>
    <text x="26" y="32" class="small">检查标签</text>
    <g transform="translate(26 54)">
      <rect x="0" y="-18" width="76" height="30" rx="15" fill="#18352f"/><text x="15" y="3" class="tag">安全组</text>
      <rect x="92" y="-18" width="76" height="30" rx="15" fill="#18352f"/><text x="109" y="3" class="tag">22 端口</text>
      <rect x="184" y="-18" width="82" height="30" rx="15" fill="#18352f"/><text x="199" y="3" class="tag">SSH 密钥</text>
      <rect x="282" y="-18" width="118" height="30" rx="15" fill="#18352f"/><text x="297" y="3" class="tag">root/普通用户</text>
      <rect x="416" y="-18" width="76" height="30" rx="15" fill="#18352f"/><text x="431" y="3" class="tag">防火墙</text>
      <rect x="508" y="-18" width="62" height="30" rx="15" fill="#18352f"/><text x="523" y="3" class="tag">磁盘</text>
      <rect x="586" y="-18" width="62" height="30" rx="15" fill="#18352f"/><text x="601" y="3" class="tag">内存</text>
      <rect x="664" y="-18" width="58" height="30" rx="15" fill="#18352f"/><text x="680" y="3" class="tag">PATH</text>
      <rect x="738" y="-18" width="52" height="30" rx="15" fill="#18352f"/><text x="754" y="3" class="tag">Git</text>
      <rect x="806" y="-18" width="62" height="30" rx="15" fill="#18352f"/><text x="821" y="3" class="tag">快照</text>
    </g>
  </g>
</svg>
