<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V038 Hooks 生命周期、日志和自动化流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10131c"/>
      <stop offset="0.5" stop-color="#172033"/>
      <stop offset="1" stop-color="#261819"/>
    </linearGradient>
    <linearGradient id="nodeA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#213047"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="nodeB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f1f24"/>
      <stop offset="1" stop-color="#121827"/>
    </linearGradient>
    <linearGradient id="nodeC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173c39"/>
      <stop offset="1" stop-color="#0f1b24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L9,6 L2,10" fill="none" stroke="#aab3c2" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 800 40px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #cbd5e1; }
      .nodeTitle { font: 800 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #f8fafc; }
      .nodeText { font: 520 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #cbd5e1; }
      .code { font: 700 16px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #d1fae5; }
      .chip { font: 700 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #e5e7eb; }
      .tiny { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #a7b4c5; }
      .arrow { stroke: #aab3c2; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .softLine { stroke: #38bdf8; stroke-width: 1.2; stroke-opacity: 0.16; fill: none; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M72 142 C185 72 284 92 389 142 C498 195 600 189 726 118 C861 41 1000 68 1188 162" class="softLine"/>
  <path d="M90 580 C218 528 343 546 465 594 C590 642 718 652 858 589 C998 525 1090 538 1202 594" stroke="#fb7185" stroke-width="1.2" stroke-opacity="0.16" fill="none"/>

  <text x="72" y="72" class="title">Hooks 生命周期：从触发到日志排查</text>
  <text x="74" y="106" class="subtitle">事件触发 → 配置匹配 → 执行 Hook → 写日志 / 返回决策 → Debug 排查</text>

  <g filter="url(#shadow)">
    <rect x="72" y="168" width="190" height="154" rx="14" fill="url(#nodeA)" stroke="#60a5fa" stroke-opacity="0.55"/>
    <text x="96" y="210" class="nodeTitle">1 触发事件</text>
    <text x="96" y="246" class="nodeText">用户提交</text>
    <text x="96" y="274" class="nodeText">工具调用前后</text>
    <text x="96" y="302" class="nodeText">结束 / 失败</text>
  </g>

  <line x1="262" y1="245" x2="336" y2="245" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="340" y="148" width="220" height="194" rx="16" fill="url(#nodeB)" stroke="#fb7185" stroke-opacity="0.55"/>
    <text x="366" y="190" class="nodeTitle">2 读取配置</text>
    <text x="366" y="228" class="code">.claude/settings.json</text>
    <text x="366" y="260" class="nodeText">event + matcher</text>
    <text x="366" y="288" class="nodeText">managed policy</text>
    <text x="366" y="316" class="nodeText">Codex 需实测确认</text>
  </g>

  <line x1="560" y1="245" x2="636" y2="245" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="640" y="164" width="190" height="162" rx="16" fill="#202a3d" stroke="#f59e0b" stroke-opacity="0.58"/>
    <text x="666" y="206" class="nodeTitle">3 匹配规则</text>
    <text x="666" y="242" class="nodeText">PreToolUse</text>
    <text x="666" y="270" class="nodeText">PostToolUse</text>
    <text x="666" y="298" class="nodeText">Stop / ConfigChange</text>
  </g>

  <line x1="830" y1="245" x2="906" y2="245" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="910" y="148" width="248" height="194" rx="16" fill="url(#nodeC)" stroke="#34d399" stroke-opacity="0.56"/>
    <text x="938" y="190" class="nodeTitle">4 执行 Hook</text>
    <text x="938" y="228" class="nodeText">command：本地脚本</text>
    <text x="938" y="256" class="nodeText">HTTP：外部服务</text>
    <text x="938" y="284" class="nodeText">prompt / agent：校验</text>
    <text x="938" y="316" class="code">权限要先审查</text>
  </g>

  <line x1="1034" y1="342" x2="1034" y2="398" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="812" y="402" width="346" height="122" rx="16" fill="#14202d" stroke="#22d3ee" stroke-opacity="0.48"/>
    <text x="840" y="444" class="nodeTitle">5 输出结果</text>
    <text x="840" y="480" class="nodeText">写业务日志 / 返回决策 / 补充上下文</text>
    <text x="840" y="508" class="code">--debug-file ./logs/claude-hooks-debug.log</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="394" width="606" height="130" rx="16" fill="#1d2635" stroke="#ef4444" stroke-opacity="0.42"/>
    <text x="100" y="438" class="nodeTitle">录屏边界</text>
    <text x="100" y="474" class="nodeText">Claude Code：可演示 settings、hook、debug。</text>
    <text x="100" y="504" class="nodeText">Codex：hook 事件 / schema / 路径需录屏前实测确认。</text>
  </g>

  <line x1="678" y1="460" x2="806" y2="460" class="arrow"/>
  <line x1="735" y1="326" x2="735" y2="460" stroke="#aab3c2" stroke-width="1.4" stroke-opacity="0.72" fill="none"/>
  <line x1="735" y1="460" x2="806" y2="460" class="arrow"/>

  <g>
    <rect x="72" y="588" width="1136" height="62" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="96" y="624" class="tiny">故障排查顺序：</text>
    <g transform="translate(204 602)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">终端输出</text>
    </g>
    <g transform="translate(294 602)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">配置文件</text>
    </g>
    <g transform="translate(384 602)">
      <rect width="116" height="30" rx="15" fill="#273449"/><text x="58" y="20" text-anchor="middle" class="chip">Key/API 地址</text>
    </g>
    <g transform="translate(512 602)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">权益状态</text>
    </g>
    <g transform="translate(602 602)">
      <rect width="64" height="30" rx="15" fill="#273449"/><text x="32" y="20" text-anchor="middle" class="chip">日志页</text>
    </g>
    <g transform="translate(678 602)">
      <rect width="50" height="30" rx="15" fill="#273449"/><text x="25" y="20" text-anchor="middle" class="chip">网络</text>
    </g>
    <g transform="translate(740 602)">
      <rect width="50" height="30" rx="15" fill="#273449"/><text x="25" y="20" text-anchor="middle" class="chip">权限</text>
    </g>
    <g transform="translate(802 602)">
      <rect width="78" height="30" rx="15" fill="#273449"/><text x="39" y="20" text-anchor="middle" class="chip">项目目录</text>
    </g>
  </g>

  <text x="72" y="682" class="tiny">V038</text>
</svg>
