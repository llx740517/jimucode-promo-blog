<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V044 风险清单流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.48" stop-color="#172033"/>
      <stop offset="1" stop-color="#263237"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 1 1 L 8 5 L 1 9" fill="none" stroke="#B6C2CE" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.26">
    <path d="M160 140 C340 40 540 110 700 84 C910 50 1040 120 1180 70" fill="none" stroke="#48C7B8" stroke-width="1.5"/>
    <path d="M120 610 C320 520 460 642 650 560 C820 485 1020 620 1180 520" fill="none" stroke="#E2B65C" stroke-width="1.5"/>
  </g>
  <text x="72" y="86" fill="#F8FAFC" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="38" font-weight="800">让 AI 先说清风险，再动手改代码</text>
  <text x="72" y="126" fill="#C9D4DF" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="20">Codex / Claude Code 共用的风险清单流程</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Arial,sans-serif" filter="url(#softShadow)">
    <g transform="translate(72 178)">
      <rect width="236" height="110" rx="14" fill="#F8FAFC"/>
      <text x="24" y="45" fill="#0F172A" font-size="26" font-weight="800">读项目</text>
      <text x="24" y="78" fill="#475569" font-size="18">复现问题 / 看测试</text>
    </g>
    <g transform="translate(372 178)">
      <rect width="236" height="110" rx="14" fill="#E9FFF9"/>
      <text x="24" y="45" fill="#0F172A" font-size="26" font-weight="800">标出不确定</text>
      <text x="24" y="78" fill="#475569" font-size="18">不要把假设当事实</text>
    </g>
    <g transform="translate(672 178)">
      <rect width="236" height="110" rx="14" fill="#FFF7E5"/>
      <text x="24" y="45" fill="#0F172A" font-size="26" font-weight="800">给出方案</text>
      <text x="24" y="78" fill="#475569" font-size="18">2-3 个可选路径</text>
    </g>
    <g transform="translate(972 178)">
      <rect width="236" height="110" rx="14" fill="#FFECEC"/>
      <text x="24" y="45" fill="#0F172A" font-size="26" font-weight="800">说明风险</text>
      <text x="24" y="78" fill="#475569" font-size="18">影响范围 / 失败点</text>
    </g>
    <g transform="translate(72 400)">
      <rect width="236" height="110" rx="14" fill="#EEF2FF"/>
      <text x="24" y="45" fill="#0F172A" font-size="26" font-weight="800">小步修改</text>
      <text x="24" y="78" fill="#475569" font-size="18">只改确认过的点</text>
    </g>
    <g transform="translate(372 400)">
      <rect width="236" height="110" rx="14" fill="#F8FAFC"/>
      <text x="24" y="45" fill="#0F172A" font-size="26" font-weight="800">看 diff</text>
      <text x="24" y="78" fill="#475569" font-size="18">文件 / 函数 / 测试</text>
    </g>
    <g transform="translate(672 400)">
      <rect width="236" height="110" rx="14" fill="#ECFDF3"/>
      <text x="24" y="45" fill="#0F172A" font-size="26" font-weight="800">跑测试</text>
      <text x="24" y="78" fill="#475569" font-size="18">失败就按输出修</text>
    </g>
    <g transform="translate(972 400)">
      <rect width="236" height="110" rx="14" fill="#FDF2F8"/>
      <text x="24" y="45" fill="#0F172A" font-size="26" font-weight="800">回滚边界</text>
      <text x="24" y="78" fill="#475569" font-size="18">能撤回 / 能解释</text>
    </g>
  </g>

  <g stroke="#B6C2CE" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.9">
    <line x1="318" y1="233" x2="358" y2="233"/>
    <line x1="618" y1="233" x2="658" y2="233"/>
    <line x1="918" y1="233" x2="958" y2="233"/>
    <path d="M1090 300 V350 C1090 372 1074 382 1048 382 H190 C164 382 190 392 190 392"/>
    <line x1="318" y1="455" x2="358" y2="455"/>
    <line x1="618" y1="455" x2="658" y2="455"/>
    <line x1="918" y1="455" x2="958" y2="455"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <text x="72" y="590" fill="#CBD5E1" font-size="18" font-weight="700">排查顺序标签</text>
    <g fill="#0F172A" font-size="16" font-weight="700">
      <rect x="72" y="612" width="92" height="34" rx="17" fill="#D7F7F0"/><text x="96" y="635">终端输出</text>
      <rect x="178" y="612" width="92" height="34" rx="17" fill="#E5E7EB"/><text x="202" y="635">配置文件</text>
      <rect x="284" y="612" width="124" height="34" rx="17" fill="#FEF3C7"/><text x="302" y="635">Key/API 地址</text>
      <rect x="422" y="612" width="92" height="34" rx="17" fill="#FEE2E2"/><text x="446" y="635">权益状态</text>
      <rect x="528" y="612" width="76" height="34" rx="17" fill="#DBEAFE"/><text x="552" y="635">日志页</text>
      <rect x="618" y="612" width="60" height="34" rx="17" fill="#DCFCE7"/><text x="632" y="635">网络</text>
      <rect x="692" y="612" width="60" height="34" rx="17" fill="#FCE7F3"/><text x="706" y="635">权限</text>
      <rect x="766" y="612" width="92" height="34" rx="17" fill="#EDE9FE"/><text x="790" y="635">项目目录</text>
    </g>
  </g>
  <text x="72" y="684" fill="#8EA0AE" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="15">V044</text>
</svg>

