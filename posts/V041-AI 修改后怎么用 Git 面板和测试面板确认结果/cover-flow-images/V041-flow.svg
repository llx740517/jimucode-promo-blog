<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="V041 AI 修改后的验收闭环流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1720"/>
      <stop offset="0.52" stop-color="#172438"/>
      <stop offset="1" stop-color="#1f2430"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L7,4.5 L1,8" fill="none" stroke="#9fb1cd" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 42px; font-weight: 850; fill: #f8fbff; letter-spacing: 0; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 20px; fill: #bfd0e8; letter-spacing: 0; }
      .nodeTitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 23px; font-weight: 780; fill: #ffffff; letter-spacing: 0; }
      .nodeText { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; fill: #d7e0ee; letter-spacing: 0; }
      .code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 15px; fill: #b7efd5; }
      .tag { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 15px; fill: #e8eef8; letter-spacing: 0; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; fill: #9fb0c9; letter-spacing: 0; }
      .num { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 15px; font-weight: 800; fill: #0f1720; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M84 590 C242 528 340 626 512 552 C682 480 760 452 912 508 C1054 560 1164 528 1220 470" fill="none" stroke="#2f4667" stroke-width="2" opacity="0.46"/>
  <text x="78" y="66" class="title">AI 修改后的验收闭环</text>
  <text x="78" y="102" class="subtitle">不要只看 AI 总结：文件范围、diff 内容、测试输出，最后人工判断</text>

  <g transform="translate(74 168)" filter="url(#shadow)">
    <rect width="180" height="146" rx="8" fill="url(#card)" stroke="#557091"/>
    <circle cx="34" cy="34" r="17" fill="#8bd3ff"/><text x="29" y="40" class="num">1</text>
    <text x="24" y="75" class="nodeTitle">AI 修改完成</text>
    <text x="24" y="108" class="nodeText">先回编辑器</text>
    <text x="24" y="132" class="nodeText">不要只看总结</text>
  </g>

  <g transform="translate(298 168)" filter="url(#shadow)">
    <rect width="190" height="146" rx="8" fill="#172f48" stroke="#5aa7d5"/>
    <circle cx="34" cy="34" r="17" fill="#8bd3ff"/><text x="29" y="40" class="num">2</text>
    <text x="24" y="75" class="nodeTitle">Git 面板</text>
    <text x="24" y="108" class="nodeText">看改了哪些文件</text>
    <text x="24" y="132" class="nodeText">排除无关改动</text>
  </g>

  <g transform="translate(532 168)" filter="url(#shadow)">
    <rect width="190" height="146" rx="8" fill="#173d35" stroke="#58d391"/>
    <circle cx="34" cy="34" r="17" fill="#9cf0c8"/><text x="29" y="40" class="num">3</text>
    <text x="24" y="75" class="nodeTitle">看 diff</text>
    <text x="24" y="108" class="nodeText">逻辑是否对应</text>
    <text x="24" y="132" class="nodeText">测试是否补上</text>
  </g>

  <g transform="translate(766 168)" filter="url(#shadow)">
    <rect width="190" height="146" rx="8" fill="#332b48" stroke="#a997ff"/>
    <circle cx="34" cy="34" r="17" fill="#c7bdff"/><text x="29" y="40" class="num">4</text>
    <text x="24" y="75" class="nodeTitle">跑测试</text>
    <text x="24" y="108" class="nodeText">Testing 面板</text>
    <text x="24" y="132" class="code">npm test</text>
  </g>

  <g transform="translate(1000 168)" filter="url(#shadow)">
    <rect width="196" height="146" rx="8" fill="#3a3030" stroke="#ff9a7a"/>
    <circle cx="34" cy="34" r="17" fill="#ffc09c"/><text x="29" y="40" class="num">5</text>
    <text x="24" y="75" class="nodeTitle">人工确认</text>
    <text x="24" y="108" class="nodeText">提交 / 补问</text>
    <text x="24" y="132" class="nodeText">回滚 / 拆小</text>
  </g>

  <path d="M254 241 H290" stroke="#9fb1cd" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M488 241 H524" stroke="#9fb1cd" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M722 241 H758" stroke="#9fb1cd" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M956 241 H992" stroke="#9fb1cd" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

  <g transform="translate(134 388)" filter="url(#shadow)">
    <rect width="1012" height="116" rx="8" fill="#101827" stroke="#4f6685"/>
    <text x="26" y="38" class="nodeTitle">推荐录屏验证命令</text>
    <text x="26" y="75" class="code">git status  →  git diff  →  npm test  →  codex review --uncommitted</text>
    <text x="26" y="100" class="nodeText">Claude Code：/summarize-changes 和 /verify 需按当前版本录屏前实测确认</text>
  </g>

  <g transform="translate(78 574)">
    <text x="0" y="-18" class="small">底部检查标签：每一步都要能在录屏里看清楚，不用真实登录数据。</text>
    <rect x="0" y="0" width="112" height="34" rx="17" fill="#263855" stroke="#465c7c"/><text x="18" y="23" class="tag">工作区干净</text>
    <rect x="124" y="0" width="96" height="34" rx="17" fill="#263855" stroke="#465c7c"/><text x="144" y="23" class="tag">文件范围</text>
    <rect x="232" y="0" width="96" height="34" rx="17" fill="#24423b" stroke="#3c7464"/><text x="253" y="23" class="tag">diff 内容</text>
    <rect x="340" y="0" width="96" height="34" rx="17" fill="#332b48" stroke="#69609d"/><text x="360" y="23" class="tag">测试输出</text>
    <rect x="448" y="0" width="112" height="34" rx="17" fill="#4b3535" stroke="#8b5a55"/><text x="466" y="23" class="tag">无敏感文件</text>
    <rect x="572" y="0" width="112" height="34" rx="17" fill="#243852" stroke="#4d7798"/><text x="590" y="23" class="tag">提交前复查</text>
  </g>
</svg>
